<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Gestión Alquileres v26</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #c8a96e;
    --danger: #e05555;
    --success: #4ade80;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; overflow-x: hidden;
  }

  /* Animaciones de Transición */
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Skeleton Loading */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Layout */
  .app-container { padding: env(safe-area-inset-top) 16px 100px 16px; max-width: 600px; margin: 0 auto; }
  
  header { padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .brand { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 1px; }
  h1 { font-size: 28px; font-weight: 500; margin: 8px 0; letter-spacing: -0.5px; }

  /* Cards y Componentes */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
    transition: var(--transition);
  }
  .card:active { transform: scale(0.98); background: var(--surface2); }

  /* Badges Dinámicos */
  .badge {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-success { background: rgba(74, 222, 128, 0.1); color: var(--success); }
  .badge-warning { background: rgba(200, 169, 110, 0.1); color: var(--accent); }

  /* Chart Container */
  .chart-box { height: 200px; margin-top: 20px; position: relative; }

  /* Navegación Inferior */
  nav.tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.8); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around;
    padding: 12px 0 env(safe-area-inset-bottom); z-index: 100;
  }
  .tab-item {
    background: none; border: none; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; transition: var(--transition); cursor: pointer;
  }
  .tab-item.active { color: var(--accent); }
  .tab-item i { width: 20px; height: 20px; }

  /* Utilidades */
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .muted { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="app-container" id="app">
  </div>

<nav class="tab-bar">
  <button class="tab-item active" onclick="navigate('inicio', this)">
    <i data-lucide="home"></i><span>Inicio</span>
  </button>
  <button class="tab-item" onclick="navigate('pisos', this)">
    <i data-lucide="building-2"></i><span>Pisos</span>
  </button>
  <button class="tab-item" onclick="navigate('finanzas', this)">
    <i data-lucide="bar-chart-3"></i><span>Finanzas</span>
  </button>
  <button class="tab-item" onclick="navigate('docs', this)">
    <i data-lucide="folder-open"></i><span>Docs</span>
  </button>
</nav>

<script>
// --- ESTADO GLOBAL ---
let PISOS = [], FINANZAS = [], ACTIVIDAD = [];
let currentTab = 'inicio';

// --- INICIALIZACIÓN ---
window.onload = async () => {
  renderSkeleton();
  await loadData();
  lucide.createIcons();
};

async function loadData() {
  try {
    // Simulación de llamada API
    const response = await new Promise(resolve => setTimeout(() => resolve({
      ok: true,
      data: {
        pisos: [
          {id: 1, nombre: 'Apartamento Centro', estado: 'activo', renta: 1200},
          {id: 2, nombre: 'Estudio Malasaña', estado: 'vacio', renta: 850},
          {id: 3, nombre: 'Ático Retiro', estado: 'activo', renta: 2100}
        ],
        finanzas: [12000, 15000, 13500, 18000, 22000, 19500], // Mock mensual
        actividad: [{id:1, texto: 'Pago renta Recibido', fecha: 'Hoy'}]
      }
    }), 1200));

    if(response.ok) {
      PISOS = response.data.pisos;
      FINANZAS = response.data.finanzas;
      ACTIVIDAD = response.data.actividad;
      renderInicio();
    }
  } catch (e) {
    console.error("Error cargando datos", e);
  }
}

// --- RENDERS ---

function renderSkeleton() {
  const container = document.getElementById('app');
  container.innerHTML = `
    <header><div class="skeleton" style="width:100px; height:14px;"></div></header>
    <div class="card"><div class="skeleton" style="height:100px;"></div></div>
    <div class="card"><div class="skeleton" style="height:200px;"></div></div>
  `;
}

function renderInicio() {
  const container = document.getElementById('app');
  const ocupados = PISOS.filter(p => p.estado === 'activo').length;

  container.innerHTML = `
    <div class="fade-in">
      <header>
        <span class="brand">CARTERA INMOBILIARIA</span>
        <h1>Mis Propiedades</h1>
        <div class="muted">${PISOS.length} activos · ${ocupados} ocupados</div>
      </header>

      <div class="card">
        <div class="flex-between">
          <div>
            <div class="muted">Renta Total Mensual</div>
            <div style="font-size:24px; font-weight:600; margin-top:4px;">
              ${PISOS.reduce((acc, p) => acc + (p.estado === 'activo' ? p.renta : 0), 0)} €
            </div>
          </div>
          <i data-lucide="trending-up" style="color:var(--success)"></i>
        </div>
      </div>

      <h3 style="margin: 24px 0 16px 0; font-weight:500;">Actividad Reciente</h3>
      ${ACTIVIDAD.map(a => `
        <div class="card" style="padding:16px;">
          <div class="flex-between">
            <span style="font-size:14px;">${a.texto}</span>
            <span class="muted" style="font-size:12px;">${a.fecha}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  lucide.createIcons();
}

function renderFinanzas() {
  const container = document.getElementById('app');
  container.innerHTML = `
    <div class="fade-in">
      <header>
        <span class="brand">ANÁLISIS DE RENDIMIENTO</span>
        <h1>Finanzas</h1>
      </header>

      <div class="card">
        <div class="muted">Ingresos Brutos Anuales</div>
        <div style="font-size:24px; font-weight:600;">145.200 €</div>
        <div class="chart-box">
          <canvas id="financeChart"></canvas>
        </div>
      </div>
    </div>
  `;
  
  initFinanceChart();
  lucide.createIcons();
}

function renderPisos() {
  const container = document.getElementById('app');
  container.innerHTML = `
    <div class="fade-in">
      <header>
        <span class="brand">GESTIÓN DE ACTIVOS</span>
        <h1>Propiedades</h1>
      </header>
      ${PISOS.map(p => `
        <div class="card">
          <div class="flex-between">
            <div>
              <div style="font-weight:500; margin-bottom:4px;">${p.nombre}</div>
              <div class="muted">${p.renta} € / mes</div>
            </div>
            <span class="badge ${p.estado === 'activo' ? 'badge-success' : 'badge-warning'}">
              ${p.estado === 'activo' ? 'Alquilado' : 'Disponible'}
            </span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  lucide.createIcons();
}

// --- LÓGICA DE COMPONENTES ---

function initFinanceChart() {
  const ctx = document.getElementById('financeChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
      datasets: [{
        label: 'Ingresos',
        data: FINANZAS,
        borderColor: '#c8a96e',
        backgroundColor: 'rgba(200, 169, 110, 0.1)',
        fill: true,
        tension: 0.4,
        borderWidth: 2,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { display: false },
        x: { 
          grid: { display: false },
          ticks: { color: '#888', font: { family: 'DM Mono', size: 10 } }
        }
      }
    }
  });
}

function navigate(tab, el) {
  // Actualizar UI navegación
  document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');

  // Router simple
  if (tab === 'inicio') renderInicio();
  if (tab === 'pisos') renderPisos();
  if (tab === 'finanzas') renderFinanzas();
  if (tab === 'docs') {
    document.getElementById('app').innerHTML = '<div class="fade-in"><header><h1>Documentos</h1></header><div class="card">Próximamente...</div></div>';
  }
}
</script>

</body>
</html>
