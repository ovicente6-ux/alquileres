  const pisoOpts = PISOS.map(p=>`<option value="${p.id}" ${c&&c.pisoId===p.id?'selected':''}>${p.ico} ${p.nombre.split(' ').slice(0,2).join(' ')}</option>`).join('');
  document.getElementById('sheetTitle').textContent = c ? '✏️ Editar contrato' : '📋 Nuevo contrato';
  document.getElementById('sheetContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="form-label">Propiedad</label>
        <select id="ct_piso" class="form-input">${pisoOpts}</select></div>
      <div><label class="form-label">Nombre inquilino *</label>
        <input id="ct_inquilino" type="text" class="form-input" placeholder="Nombre completo" value="${c?c.inquilino:''}"></div>
      <div class="form-row-2">
        <div><label class="form-label">Renta mensual (€)</label>
          <input id="ct_renta" type="number" class="form-input" placeholder="0" value="${c?c.renta:''}"></div>
        <div><label class="form-label">Duración</label>
          <select id="ct_duracion" class="form-input">
            ${['1 año','2 años','3 años','5 años','Indefinido'].map(d=>`<option ${c&&c.duracion===d?'selected':''}>${d}</option>`).join('')}
          </select></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Fecha inicio</label>
          <input id="ct_inicio" type="date" class="form-input" value="${c?c.fechaInicio:new Date().toISOString().split('T')[0]}"></div>
        <div><label class="form-label">Fecha fin</label>
          <input id="ct_fin" type="date" class="form-input" value="${c?c.fechaFin:''}"></div>
      </div>
      <div><label class="form-label">Adjuntar contrato (PDF)</label>
        <div style="border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;background:var(--surface2)" id="ct_dropzone" onclick="document.getElementById('ct_file').click()">
          <div style="font-size:20px;margin-bottom:4px">📎</div>
          <div style="font-size:13px;font-weight:500">Adjuntar documento</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">PDF · máx. 20 MB</div>
          <div id="ct_filelist" style="margin-top:6px"></div>
        </div>
        <input type="file" id="ct_file" style="display:none" accept=".pdf,.jpg,.jpeg,.png" multiple onchange="onCtFileSelected(this)">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="guardarContrato('${c?c.id:''}')">
          💾 ${c?'Guardar cambios':'Crear contrato'}
        </button>
        ${c?`<button class="btn btn-danger btn-sm" onclick="eliminarContrato('${c.id}')">🗑️</button>`:''}
      </div>
    </div>`;
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function onCtFileSelected(input) {
  const files = Array.from(input.files);
  const zone = document.getElementById('ct_dropzone');
  const list = document.getElementById('ct_filelist');
  if (zone) { zone.style.borderColor='var(--accent)'; zone.style.background='rgba(200,169,110,0.06)'; }
  if (list) list.innerHTML = files.map(f=>`<div style="font-size:12px;color:var(--success);margin-top:3px">✓ ${f.name}</div>`).join('');
}

async function guardarContrato(id) {
  const inquilino = document.getElementById('ct_inquilino')?.value?.trim();
  if (!inquilino) { showToast('⚠️ El nombre del inquilino es obligatorio'); return; }
  const pisoId   = document.getElementById('ct_piso')?.value || (PISOS[0]&&PISOS[0].id);
  const renta    = parseFloat(document.getElementById('ct_renta')?.value)||0;
  const duracion = document.getElementById('ct_duracion')?.value || '1 año';
  const inicio   = document.getElementById('ct_inicio')?.value || '';
  const fin      = document.getElementById('ct_fin')?.value || '';
  const piso     = PISOS.find(p=>p.id===pisoId);
  const fileInput = document.getElementById('ct_file');
  const files    = fileInput && fileInput.files ? Array.from(fileInput.files) : [];

  const FASES_DEFECTO = [
    { label:'① Verificación inquilino', pasos:[
      { id:'p1', titulo:'Solicitar documentación al inquilino', meta:'DNI/NIE, 3 últimas nóminas, declaración IRPF', plazo:'Inicio', doc:true, hecho:false, fechaHecho:null },
      { id:'p2', titulo:'Verificar solvencia y referencias', meta:'Comprobar deuda INEM, referencias anteriores', plazo:'Antes de firmar', doc:false, hecho:false, fechaHecho:null },
      { id:'p3', titulo:'Archivar documentación inquilino', meta:'PDFs en carpeta Inquilinos de Drive', plazo:'Antes de firmar', doc:true, hecho:false, fechaHecho:null },
    ]},
    { label:'② Redacción y firma', pasos:[
      { id:'p4', titulo:'Redactar contrato de arrendamiento', meta:'Según LAU · Incluir cláusulas IPC y actualización', plazo:'Antes de firma', doc:true, hecho:false, fechaHecho:null },
      { id:'p5', titulo:'Firmar 2 copias originales del contrato', meta:'Propietario e inquilino · Cada uno conserva 1', plazo:'Día firma', doc:true, hecho:false, fechaHecho:null },
      { id:'p6', titulo:'Firmar inventario y acta de entrega de llaves', meta:'Fotografiar estado del piso · Firmar inventario', plazo:'Día firma', doc:true, hecho:false, fechaHecho:null },
    ]},
    { label:'③ Fianza y suministros', pasos:[
      { id:'p7', titulo:'Cobrar fianza y depósito adicional', meta:`${renta > 0 ? renta + ' € fianza (1 mes) · 2 meses máx. adicional' : 'Importe equivalente a 1 mes de renta'}`, plazo:'Día firma', doc:false, hecho:false, fechaHecho:null },
      { id:'p8', titulo:'Depositar fianza en DGA (IGEAR)', meta:'Plazo máximo 30 días desde firma · Ibercaja o CAI', plazo:'≤ 30 días', doc:true, hecho:false, fechaHecho:null },
      { id:'p9', titulo:'Cambio de titularidad suministros', meta:'Luz, agua, gas a nombre del inquilino', plazo:'≤ 5 días', doc:false, hecho:false, fechaHecho:null },
    ]},
    { label:'④ Tramitación final', pasos:[
      { id:'p10', titulo:'Entregar llaves y copia del contrato al inquilino', meta:'2 juegos de llaves · 1 copia del contrato firmado', plazo:'Día entrada', doc:false, hecho:false, fechaHecho:null },
      { id:'p11', titulo:'Dar de alta en Hacienda si procede', meta:'Modelo 036/037 si es actividad económica', plazo:'Primer mes', doc:false, hecho:false, fechaHecho:null },
      { id:'p12', titulo:'Archivar toda la documentación en Drive', meta:'Contrato + fianza + inventario + DGA', plazo:'Completado', doc:false, hecho:false, fechaHecho:null },
    ]},
  ];

  closeSheet();
  showToast('💾 Guardando contrato…');

  let contratoId = id;
  if (id) {
    const idx = CONTRATOS_CHECKLIST.findIndex(x=>x.id===id);
    if (idx !== -1) {
      CONTRATOS_CHECKLIST[idx] = { ...CONTRATOS_CHECKLIST[idx], pisoId, inquilino, renta, duracion, fechaInicio:inicio, fechaFin:fin };
    }
    await api({ action:'update', sheet:'Contratos', id, data:{ piso_id:pisoId, inquilino, renta, duracion, fecha_inicio:inicio, fecha_fin:fin }});
    showToast('✅ Contrato actualizado');
  } else {
    const nuevo = { id:'ct_'+Date.now(), pisoId, inquilino, renta, duracion, fechaInicio:inicio, fechaFin:fin, fases:FASES_DEFECTO, docs:[] };
    contratoId = nuevo.id;
    CONTRATOS_CHECKLIST.unshift(nuevo);
    await api({ action:'write', sheet:'Contratos', data:{ id:nuevo.id, piso_id:pisoId, inquilino, renta, duracion, fecha_inicio:inicio, fecha_fin:fin, creado_en:new Date().toISOString().split('T')[0] }});
    // Guardar pasos en Sheets
    for (const fase of FASES_DEFECTO) {
      for (let i=0; i<fase.pasos.length; i++) {
        const paso = fase.pasos[i];
        await api({ action:'write', sheet:'Contrato_Pasos', data:{ id:paso.id, contrato_id:nuevo.id, fase:fase.label, titulo:paso.titulo, meta:paso.meta, plazo:paso.plazo, requiere_doc:paso.doc, hecho:false, fecha_hecho:'', orden:i }});
      }
    }
    showToast('✅ Contrato creado · 12 pasos del checklist listos');
  }

  // Subir documentos adjuntos
  if (files.length > 0 && piso) {
    for (const file of files) {
      if (file.size > 20*1024*1024) { showToast(`⚠️ "${file.name.substring(0,20)}" supera 20 MB`); continue; }
      showToast(`☁️ Subiendo "${file.name.substring(0,20)}"…`);
      await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/pdf', base64Data:base64, pisoId, pisoNombre:piso.nombre, carpeta:'Contrato Arrendamiento' });
          if (res.ok && res.data && res.data.success) {
            const idx = CONTRATOS_CHECKLIST.findIndex(x=>x.id===contratoId);
            if (idx !== -1) {
              if (!CONTRATOS_CHECKLIST[idx].docs) CONTRATOS_CHECKLIST[idx].docs = [];
              CONTRATOS_CHECKLIST[idx].docs.push({ name:file.name, url:res.data.url });
            }
            showToast(`✅ "${file.name.substring(0,20)}" guardado en Drive`);
          }
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
  }

  expandedContrato = contratoId;
  renderContrato(document.getElementById('mainContent'));
}

async function eliminarContrato(id) {
  if (!confirm('¿Eliminar este contrato?')) return;
  closeSheet();
  const idx = CONTRATOS_CHECKLIST.findIndex(x=>x.id===id);
  const c = idx !== -1 ? CONTRATOS_CHECKLIST[idx] : null;
  if (idx !== -1) CONTRATOS_CHECKLIST.splice(idx, 1);
  await api({ action:'delete', sheet:'Contratos', id });
  if (c && c.docs) for (const doc of c.docs) await api({ action:'moveUrlToBorrados', fileUrl:doc.url });
  showToast('🗑️ Contrato eliminado · documentos movidos a BORRADOS en Drive');
  renderContrato(document.getElementById('mainContent'));
}

async function subirDocContrato(contratoId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,.jpg,.jpeg,.png';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const c = CONTRATOS_CHECKLIST.find(x=>x.id===contratoId);
    const piso = c ? PISOS.find(p=>p.id===c.pisoId) : null;
    if (file.size > 20*1024*1024) { showToast('⚠️ El archivo supera 20 MB'); return; }
    showToast('☁️ Subiendo a Drive…');
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/pdf', base64Data:base64, pisoId:c?.pisoId||(PISOS[0]?.id), pisoNombre:piso?.nombre||'General', carpeta:'Contrato Arrendamiento' });
        if (res.ok && res.data && res.data.success) {
          const idx = CONTRATOS_CHECKLIST.findIndex(x=>x.id===contratoId);
          if (idx !== -1) {
            if (!CONTRATOS_CHECKLIST[idx].docs) CONTRATOS_CHECKLIST[idx].docs = [];
            CONTRATOS_CHECKLIST[idx].docs.push({ name:file.name, url:res.data.url });
          }
          showToast('✅ Documento adjuntado');
          renderContrato(document.getElementById('mainContent'));
        } else showToast('⚠️ Error subiendo');
        resolve();
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

          if (idx !== -1) {
            if (!SUMINISTROS[idx].docs) SUMINISTROS[idx].docs = [];
            SUMINISTROS[idx].docs.push({ name:file.name, url:res.data.url });
          }
          showToast('✅ Documento adjuntado · guardado en Drive / Suministros');
          renderSuministros(document.getElementById('mainContent'));
        } else showToast('⚠️ Error subiendo');
        resolve();
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-UxGj4NdvFmnYEFsFa47t8Vg3Na8BJzJEPuavCrrP1skiPB3FP3MYYBkxZlKWWOJbPQ/exec';

// ── LLAMADA AL APPS SCRIPT ──
// Apps Script requiere no-cors o redirect:follow para evitar el error "Failed to fetch"
async function api(body) {
  return new Promise(function(resolve) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SCRIPT_URL, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      try {
        var parsed = JSON.parse(xhr.responseText);
        if (!parsed.ok && parsed.error) console.error('API error:', parsed.error);
        resolve(parsed);
      } catch(e) {
        console.error('Respuesta no JSON:', xhr.responseText ? xhr.responseText.substring(0,200) : '(vacía)');
        resolve({ ok: false, error: 'Respuesta inesperada del servidor' });
      }
    };
    xhr.onerror = function() {
      console.error('XHR error de red');
      resolve({ ok: false, error: 'Error de red' });
    };
    xhr.send(JSON.stringify(body));
  });
}

async function cargarTodo() {
  mostrarPantallaCarga('Cargando datos…');

  try {
    // Inicializar hojas (crea las que faltan, no borra nada)
    await api({ action:'init' });

    // Leer pisos
    const resPisos = await api({ action:'read', sheet:'Pisos' });

    if (resPisos.ok && resPisos.data && resPisos.data.rows && resPisos.data.rows.length > 0) {
      SHEETS_OK = true;
      PISOS.length = 0;
      resPisos.data.rows.forEach(row => {
        PISOS.push({
          id: String(row.id), nombre: row.nombre||'Sin nombre',
          dir: row.direccion||'', tipo: row.tipo||'residencial',
          estado: row.estado||'activo', inquilino: row.inquilino||null,
          renta: Number(row.renta)||0, ingresos: Number(row.ingresos)||0,
          gastos: Number(row.gastos)||0, ico: row.ico||'🏠',
          docs: 0, driveUrl: row.drive_url||null,
          carpetas: getCarpetasPorTipo(row.tipo||'residencial'),
        });
      });

      // Averías
      const resAv = await api({ action:'read', sheet:'Averias' });
      if (resAv.ok && resAv.data && resAv.data.rows) {
        AVERIAS.length = 0;
        resAv.data.rows.forEach(r => AVERIAS.push({
          id:String(r.id), pisoId:String(r.piso_id),
          titulo:r.titulo||'', descripcion:r.descripcion||'',
          categoria:r.categoria||'Otros', fecha:r.fecha||'',
          coste:Number(r.coste)||0, tecnico:r.tecnico||'',
          garantia:r.garantia||null,
          factura:r.tiene_factura==='true'||r.tiene_factura===true,
          estado:r.estado||'abierto', expandido:false,
        }));
      }

      // Fianzas + pasos
      const [resFi, resFp] = await Promise.all([
        api({action:'read',sheet:'Fianzas'}),
        api({action:'read',sheet:'Fianza_Pasos'}),
      ]);
      if (resFi.ok && resFi.data && resFi.data.rows && resFi.data.rows.length > 0) {
        const pp = {};
        if (resFp.ok && resFp.data && resFp.data.rows) {
          resFp.data.rows.forEach(p => {
            if (!pp[p.fianza_id]) pp[p.fianza_id] = [];
            pp[p.fianza_id].push({ id:String(p.id), titulo:p.titulo||'', meta:p.meta||'', plazo:p.plazo||'',
              doc:p.requiere_doc==='true'||p.requiere_doc===true,
              hecho:p.hecho==='true'||p.hecho===true, fechaHecho:p.fecha_hecho||null });
          });
        }
        FIANZAS.length = 0;
        resFi.data.rows.forEach(r => FIANZAS.push({
          id:String(r.id), pisoId:String(r.piso_id), tipo:r.tipo||'deposito',
          inquilino:r.inquilino||'', importe:Number(r.importe)||0,
          fechaInicio:r.fecha_inicio||'', numExpediente:r.num_expediente||null,
          pasos:pp[r.id]||[],
        }));
      }

      // Actividad
      const resAct = await api({action:'read',sheet:'Actividad'});
      if (resAct.ok && resAct.data && resAct.data.rows) {
        ACTIVIDAD.length = 0;
        resAct.data.rows.slice(-30).reverse().forEach(r => ACTIVIDAD.push({
          tipo:r.tipo||'doc', piso:String(r.piso_id), titulo:r.titulo||'',
          meta:r.meta||'', tag:r.tag||'', tagClass:r.tag_clase||'gold',
        }));
      }

      // Cargar gastos fiscales
      const resGastos = await api({action:'read', sheet:'Gastos'});
      if (resGastos.ok && resGastos.data && resGastos.data.rows) {
        GASTOS_FISCAL.length = 0;
        resGastos.data.rows.forEach(r => GASTOS_FISCAL.push({
          id:          String(r.id),
          pisoId:      String(r.piso_id),
          concepto:    r.concepto    || '',
          categoria:   r.categoria   || 'otros',
          importe:     Number(r.importe) || 0,
          fecha:       r.fecha        || '',
          proveedor:   r.proveedor    || '',
          numFactura:  r.num_factura  || '',
          formaPago:   r.forma_pago   || '',
          conIva:      r.con_iva === 'true' || r.con_iva === true,
          notas:       r.notas        || '',
          facturaUrl:  r.factura_url  || null,
        }));
        // Agregar gastos por piso
        actualizarGastosPorPiso();
      }

      // Cargar otra documentación
      const resOtraDoc = await api({action:'read', sheet:'OtraDoc'});
      if (resOtraDoc.ok && resOtraDoc.data && resOtraDoc.data.rows) {
        OTRA_DOC.length = 0;
        resOtraDoc.data.rows.forEach(r => OTRA_DOC.push({
          id:          String(r.id),
          pisoId:      String(r.piso_id),
          titulo:      r.titulo       || '',
          categoria:   r.categoria    || 'otros',
          fecha:       r.fecha        || '',
          descripcion: r.descripcion  || '',
          fileUrl:     r.file_url     || null,
          fileName:    r.file_name    || null,
          creado_en:   r.creado_en    || '',
        }));
      }

      showToast('✅ Datos cargados correctamente');

    } else if (!resPisos.ok) {
      // Error real de conexión
      console.error('Error Sheets:', resPisos.error);
      SHEETS_OK = false;
      PISOS.length = AVERIAS.length = FIANZAS.length = ACTIVIDAD.length = 0;
      showToast('⚠️ Error conectando · Pulsa ⟳ para reintentar');
    } else {
      // Sheets vacío — primera vez o sin datos
      SHEETS_OK = true;
      PISOS.length = AVERIAS.length = FIANZAS.length = ACTIVIDAD.length = 0;
      showToast('☁️ Conectado · Añade tus propiedades reales');
    }

  } catch(err) {
    console.error('cargarTodo error:', err);
    SHEETS_OK = false;
    showToast('⚠️ Error de red · Pulsa ⟳ para reintentar');
  }

  render();
}

async function handleFiles(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const pisoId  = selectedPisoForUpload || (PISOS[0] && PISOS[0].id);
  const piso    = PISOS.find(p => p.id === pisoId);
  const carpeta = selectedCarpetaForUpload || 'General';

  if (!piso) { showToast('⚠️ Selecciona una propiedad primero'); return; }

  for (const file of files) {
    // Límite 20 MB
    if (file.size > 20 * 1024 * 1024) {
      showToast(`⚠️ "${file.name.substring(0,20)}" supera 20 MB · Comprime el PDF`);
      continue;
    }

    showToast(`☁️ Subiendo "${file.name.substring(0,22)}"…`);

    try {
      await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
        reader.onload  = async (e) => {
          try {
            const dataUrl = e.target.result;
            if (!dataUrl) throw new Error('Archivo vacío');
            const base64 = dataUrl.split(',')[1];
            if (!base64) throw new Error('Error de codificación');

            const payload = {
              action:     'upload',
              fileName:   file.name,
              mimeType:   file.type || 'application/octet-stream',
              base64Data: base64,
              pisoId:     pisoId,
              pisoNombre: piso.nombre,
              carpeta:    carpeta,
            };

            const res = await api(payload);
            console.log('Upload response:', JSON.stringify(res).substring(0,200));

            if (res.ok && res.data && res.data.success) {
              showToast(`✅ "${file.name.substring(0,20)}" guardado en Drive`);
              ACTIVIDAD.unshift({ tipo:'doc', piso:pisoId, titulo:file.name.substring(0,40), meta:piso.nombre+' · '+carpeta, tag:'DOC', tagClass:'gold' });
              const idx = PISOS.findIndex(p => p.id === pisoId);
              if (idx !== -1) PISOS[idx].docs = (PISOS[idx].docs||0) + 1;
            } else {
              const errDetail = res.error || (res.data && res.data.error) || JSON.stringify(res).substring(0,120);
              console.error('Upload failed. Full response:', JSON.stringify(res));
              showToast(`⚠️ Error subida: ${String(errDetail).substring(0,80)}`);
            }
          } catch(err) {
            console.error('Upload inner error:', err);
            showToast(`⚠️ Error subiendo: ${err.message || 'desconocido'}`);
          }
          resolve();
        };
        reader.readAsDataURL(file);
      });
    } catch(err) {
      console.error('Upload outer error:', err);
      showToast(`⚠️ ${err.message || 'Error subiendo archivo'}`);
    }
  }

  if (currentView === 'carpeta') renderCarpeta(document.getElementById('mainContent'));
  input.value = '';
}

async function guardarPiso(id) {
  const nombre = document.getElementById('fp_nombre').value.trim();
  if (!nombre) { showToast('⚠️ El nombre es obligatorio'); return; }
  const datos = { nombre, dir: document.getElementById('fp_dir').value.trim(), tipo: document.getElementById('fp_tipo').value, estado: document.getElementById('fp_estado').value, inquilino: document.getElementById('fp_inquilino').value.trim()||null, renta: parseFloat(document.getElementById('fp_renta').value)||0, ingresos: parseFloat(document.getElementById('fp_ingresos').value)||0, gastos: parseFloat(document.getElementById('fp_gastos').value)||0, ico: document.getElementById('fp_ico').value||'🏠' };
  closeSheet();
  if (id) {
    const idx = PISOS.findIndex(p => p.id === id);
    if (idx !== -1) PISOS[idx] = { ...PISOS[idx], ...datos };
    showToast('💾 Guardando…');
    await api({ action:'update', sheet:'Pisos', id, data:{ ...datos, direccion:datos.dir } });
    showToast('✅ Propiedad actualizada');
  } else {
    const pisoId = 'p_' + Date.now();
    const nuevo  = { id:pisoId, ...datos, docs:0, carpetas:getCarpetasPorTipo(datos.tipo) };
    PISOS.push(nuevo); render();
    showToast('💾 Guardando en Sheets…');
    await api({ action:'write', sheet:'Pisos', data:{ id:pisoId, nombre:nuevo.nombre, direccion:nuevo.dir, tipo:nuevo.tipo, estado:nuevo.estado, inquilino:nuevo.inquilino||'', renta:nuevo.renta, ingresos:nuevo.ingresos, gastos:nuevo.gastos, ico:nuevo.ico, drive_url:'', creado_en:new Date().toISOString().split('T')[0] } });
    showToast('📁 Creando carpetas en Drive…');
    const resDrive = await api({ action:'createFolders', pisoId, pisoNombre:nuevo.nombre, carpetas:nuevo.carpetas.map(c=>c.nombre) });
    if (resDrive.ok && resDrive.data && resDrive.data.success) {
      showToast(`✅ "${nuevo.nombre}" creada · ${nuevo.carpetas.length} carpetas en Drive 📁`);
    } else {
      console.error('Drive folders error:', resDrive);
      showToast('✅ Propiedad creada · ⚠️ Revisa permisos Drive');
    }
  }
  render();
}

async function eliminarPiso(id) {
  closeSheet();
  const idx = PISOS.findIndex(p => p.id === id);
  if (idx !== -1) PISOS.splice(idx, 1);
  await api({ action:'delete', sheet:'Pisos', id });
  showToast('🗑️ Propiedad eliminada');
  currentView = 'pisos'; render();
}

// Agrega los gastos registrados en el módulo Gastos al campo p.gastos de cada piso
// Solo cuenta gastos del mes actual para que coincida con la vista mensual
function actualizarGastosPorPiso() {
  const hoy    = new Date();
  const mes    = hoy.getMonth();
  const anio   = hoy.getFullYear();

  // Acumular gastos por piso del mes actual
  const totales = {};
  GASTOS_FISCAL.forEach(g => {
    if (!g.pisoId || !g.importe) return;
    const fechaG = g.fecha ? new Date(g.fecha) : null;
    // Incluir todos los gastos si no tienen fecha, o los del mes/año actual
    const esMesActual = !fechaG || (fechaG.getMonth()===mes && fechaG.getFullYear()===anio);
    if (esMesActual) {
      totales[g.pisoId] = (totales[g.pisoId]||0) + (Number(g.importe)||0);
    }
  });

  // Actualizar PISOS con el total calculado
  PISOS.forEach(p => {
    if (totales[p.id] !== undefined) {
      p.gastos = totales[p.id];
    }
  });
}

function getCatFiscal(id) { return CATS_FISCAL.find(c=>c.id===id) || CATS_FISCAL[CATS_FISCAL.length-1]; }

function getAniosDisponibles() {
  const anios = new Set(GASTOS_FISCAL.map(g => g.fecha ? new Date(g.fecha).getFullYear() : new Date().getFullYear()));
  anios.add(new Date().getFullYear());
  return Array.from(anios).sort((a,b)=>b-a);
}

function getGastosFiltrados() {
  return GASTOS_FISCAL.filter(g => {
    const anioG = g.fecha ? new Date(g.fecha).getFullYear() : new Date().getFullYear();
    return anioG===anioFiltro && (pisoFiltroG==='todos'||g.pisoId===pisoFiltroG);
  });
}

function getResumenFiscal(gastos) {
  const r = {};
  gastos.forEach(g => {
    const cat = getCatFiscal(g.categoria);
    if (!r[g.categoria]) r[g.categoria] = { label:cat.label, ico:cat.ico, total:0, deducible:cat.deducible };
    r[g.categoria].total += Number(g.importe)||0;
  });
  return r;
}

function onFacturaSelected(input) {

  if (label) { label.style.display = 'block'; label.textContent = `✓ ${file.name.substring(0,40)}`; }
}

async function guardarGasto(id) {
  const concepto = document.getElementById('gg_concepto')?.value?.trim();
  if (!concepto) { showToast('⚠️ El concepto es obligatorio'); return; }
  const datos = {
    pisoId:     document.getElementById('gg_piso').value,
    concepto,
    categoria:  document.getElementById('gg_cat').value,
    importe:    parseFloat(document.getElementById('gg_importe').value)||0,
    fecha:      document.getElementById('gg_fecha').value,
    proveedor:  document.getElementById('gg_prov').value.trim(),
    numFactura: document.getElementById('gg_nfact').value.trim(),
    formaPago:  document.getElementById('gg_pago').value,
    conIva:     document.getElementById('gg_iva').value==='si',
    notas:      document.getElementById('gg_notas').value.trim(),
  };

  // Capturar archivo de factura si se seleccionó
  const facturaInput = document.getElementById('gg_facturaFile');
  const facturaFile  = facturaInput && facturaInput.files[0] ? facturaInput.files[0] : null;

  closeSheet(); showToast('💾 Guardando…');

  let gastoId = id;
  if (id) {
    const idx = GASTOS_FISCAL.findIndex(x=>x.id===id);
    if (idx!==-1) GASTOS_FISCAL[idx] = { ...GASTOS_FISCAL[idx], ...datos };
    await api({ action:'update', sheet:'Gastos', id, data:{ piso_id:datos.pisoId, concepto:datos.concepto, categoria:datos.categoria, importe:datos.importe, fecha:datos.fecha, proveedor:datos.proveedor, num_factura:datos.numFactura, forma_pago:datos.formaPago, con_iva:datos.conIva, notas:datos.notas } });
    showToast('✅ Gasto actualizado');
  } else {
    const gasto = { id:'g_'+Date.now(), ...datos, facturaUrl:null };
    gastoId = gasto.id;
    GASTOS_FISCAL.unshift(gasto);
    await api({ action:'write', sheet:'Gastos', data:{ id:gasto.id, piso_id:datos.pisoId, concepto:datos.concepto, categoria:datos.categoria, importe:datos.importe, fecha:datos.fecha, proveedor:datos.proveedor, num_factura:datos.numFactura, forma_pago:datos.formaPago, con_iva:datos.conIva, notas:datos.notas, factura_url:'', creado_en:new Date().toISOString().split('T')[0] } });
    showToast('✅ Gasto registrado');
  }

  // Subir factura si se adjuntó
  if (facturaFile && gastoId) {
    showToast('☁️ Subiendo factura a Drive…');
    gastoParaFactura = gastoId;
    const piso = PISOS.find(p=>p.id===datos.pisoId);
    await new Promise(resolve=>{
      const reader = new FileReader();
      reader.onload = async (e)=>{
        const base64 = e.target.result.split(',')[1];
        const res = await api({ action:'upload', fileName:facturaFile.name, mimeType:facturaFile.type||'application/pdf', base64Data:base64, pisoId:datos.pisoId, pisoNombre:piso?.nombre||'General', carpeta:'Gastos' });
        if (res.ok && res.data && res.data.success) {
          const idx = GASTOS_FISCAL.findIndex(g=>g.id===gastoId);
          if (idx!==-1) GASTOS_FISCAL[idx].facturaUrl = res.data.url;
          await api({ action:'update', sheet:'Gastos', id:gastoId, data:{ factura_url:res.data.url } });
          showToast('✅ Factura adjuntada en Drive');
        } else { showToast('⚠️ Error subiendo factura'); }
        gastoParaFactura = null;
        resolve();
      };
      reader.readAsDataURL(facturaFile);
    });
  }

  // Actualizar gastos en la vista de propiedades y finanzas
  actualizarGastosPorPiso();
  renderGastos(document.getElementById('mainContent'));
}

const _origHandleFiles = handleFiles;
window.handleFiles = async function(input) {
  if (gastoParaFactura) {
    const files = Array.from(input.files);
    const gasto = GASTOS_FISCAL.find(g=>g.id===gastoParaFactura);
    if (!files.length || !gasto) { gastoParaFactura=null; input.value=''; return; }
    const file = files[0];
    const piso = PISOS.find(p=>p.id===gasto.pisoId);
    showToast('☁️ Subiendo factura…');
    await new Promise(resolve=>{
      const reader = new FileReader();
      reader.onload = async (e)=>{
        const base64 = e.target.result.split(',')[1];
        const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/pdf', base64Data:base64, pisoId:gasto.pisoId, pisoNombre:piso?.nombre||'General', carpeta:'Gastos' });
        if (res.ok && res.data && res.data.success) {
          const idx = GASTOS_FISCAL.findIndex(g=>g.id===gastoParaFactura);
          if (idx!==-1) {
            GASTOS_FISCAL[idx].facturaUrl = res.data.url;
            await api({ action:'update', sheet:'Gastos', id:gastoParaFactura, data:{ factura_url:res.data.url } });
          }
          showToast('✅ Factura adjuntada en Drive');
          if (currentView==='gastos') renderGastos(document.getElementById('mainContent'));
        } else { showToast('⚠️ Error subiendo factura'); }
        resolve();
      };
      reader.readAsDataURL(file);
    });
    gastoParaFactura=null; input.value='';
  } else {
    await _origHandleFiles(input);
  }
};

function exportarFiscal() {
  const gastosF = getGastosFiltrados();
  const resumen = getResumenFiscal(gastosF);
  const total   = gastosF.reduce((s,g)=>s+(Number(g.importe)||0),0);
  const piso    = pisoFiltroG!=='todos' ? PISOS.find(p=>p.id===pisoFiltroG)?.nombre : 'Todas las propiedades';
  let csv = `RESUMEN GASTOS DEDUCIBLES IRPF ${anioFiltro}\nPropiedad: ${piso}\n\nCategoría;Importe (€);% Deducible\n`;
  Object.entries(resumen).forEach(([k,v])=>{ csv+=`${v.label};${v.total.toFixed(2)};${v.deducible}\n`; });
  csv+=`\nTOTAL DEDUCIBLE;${total.toFixed(2)};—\n\nDETALLE DE GASTOS\nFecha;Concepto;Proveedor;Categoría;Importe;Nº Factura;Forma pago;Factura adjunta\n`;
  [...gastosF].sort((a,b)=>new Date(a.fecha||0)-new Date(b.fecha||0)).forEach(g=>{
    const cat=getCatFiscal(g.categoria);
    csv+=`${g.fecha||''};${g.concepto||''};${g.proveedor||''};${cat.label};${(Number(g.importe)||0).toFixed(2)};${g.numFactura||''};${g.formaPago||''};${g.facturaUrl?'Sí':'No'}\n`;
  });
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`gastos_irpf_${anioFiltro}.csv`; a.click();
  showToast('✅ CSV exportado · Ábrelo en Excel para la declaración');
}

function htmlAdjunto(prefix, label) {
  return `<div>
    <label class="form-label">${label||'Adjuntar documentos (PDF, imagen)'}</label>
    <div id="${prefix}_dropzone" style="border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface2)" onclick="document.getElementById('${prefix}_file').click()">
      <div style="font-size:20px;margin-bottom:4px">📎</div>
      <div style="font-size:13px;font-weight:500">Adjuntar documento</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">PDF, imagen · máx. 20 MB · varios archivos</div>
    </div>
    <div id="${prefix}_filelist" style="margin-top:6px;display:flex;flex-direction:column;gap:4px"></div>
    <input type="file" id="${prefix}_file" style="display:none" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" multiple onchange="onAdjuntoSelected('${prefix}',this)">
  </div>`;
}

function onAdjuntoSelected(prefix, input) {
  const files = Array.from(input.files);
  const zone  = document.getElementById(prefix+'_dropzone');
  const list  = document.getElementById(prefix+'_filelist');
  if (!files.length) return;
  if (zone) { zone.style.borderColor='var(--accent)'; zone.style.background='rgba(200,169,110,0.06)'; }
  if (list) list.innerHTML = files.map(f=>`<div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:6px;padding:7px 10px"><span>📄</span><span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--success)">${f.name}</span><span style="font-size:11px;color:var(--muted)">${(f.size/1024/1024).toFixed(1)} MB</span></div>`).join('');
}

async function subirAdjuntos(prefix, pisoId, pisoNombre, carpeta) {
  const input = document.getElementById(prefix+'_file');
  if (!input || !input.files || !input.files.length) return [];
  const pNombre = pisoNombre || PISOS.find(p=>p.id===pisoId)?.nombre || 'General';
  const subidos = [];
  for (const file of Array.from(input.files)) {
    if (file.size > 20*1024*1024) { showToast(`⚠️ "${file.name.substring(0,20)}" supera 20 MB`); continue; }
    showToast(`☁️ Subiendo "${file.name.substring(0,22)}"…`);
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/octet-stream', base64Data:base64, pisoId, pisoNombre:pNombre, carpeta:carpeta||'General' });
        if (res.ok && res.data && res.data.success) { subidos.push({ url:res.data.url, name:file.name }); showToast(`✅ "${file.name.substring(0,20)}" guardado`); }
        else showToast(`⚠️ Error subiendo "${file.name.substring(0,20)}"`);
        resolve();
      };
      reader.onerror = () => { showToast('⚠️ Error leyendo archivo'); resolve(); };
      reader.readAsDataURL(file);
    });
  }
  return subidos;
}

async function guardarOtraDoc(id) {
  const titulo = document.getElementById('od_titulo')?.value?.trim();
  if (!titulo) { showToast('⚠️ El título es obligatorio'); return; }
  const datos = {
    pisoId:      document.getElementById('od_piso')?.value || (PISOS[0]&&PISOS[0].id),
    titulo,
    categoria:   document.getElementById('od_cat')?.value || 'otros',
    fecha:       document.getElementById('od_fecha')?.value || new Date().toISOString().split('T')[0],
    descripcion: document.getElementById('od_desc')?.value?.trim() || '',
  };
  const fileInput = document.getElementById('od_file');
  const file = fileInput && fileInput.files[0] ? fileInput.files[0] : null;
  closeSheet();
  showToast('💾 Guardando…');
  let docId = id;
  if (id) {
    const idx = OTRA_DOC.findIndex(x=>x.id===id);
    if (idx !== -1) OTRA_DOC[idx] = { ...OTRA_DOC[idx], ...datos };
    await api({ action:'update', sheet:'OtraDoc', id, data:{ piso_id:datos.pisoId, titulo:datos.titulo, categoria:datos.categoria, fecha:datos.fecha, descripcion:datos.descripcion }});
    showToast('✅ Documento actualizado');
  } else {
    const doc = { id:'od_'+Date.now(), ...datos, fileUrl:null, fileName:null, creado_en:new Date().toISOString().split('T')[0] };
    docId = doc.id;
    OTRA_DOC.unshift(doc);
    await api({ action:'write', sheet:'OtraDoc', data:{ id:doc.id, piso_id:datos.pisoId, titulo:datos.titulo, categoria:datos.categoria, fecha:datos.fecha, descripcion:datos.descripcion, file_url:'', file_name:'', creado_en:doc.creado_en }});
    showToast('✅ Documento añadido');
  }
  if (file && docId) {
    const piso     = PISOS.find(p=>p.id===datos.pisoId);
    const catLabel = getOtraDocCat(datos.categoria).label; // ej: "Instalaciones", "Legal & Licencias"
    const carpeta  = `Documentacion/${catLabel}`;          // subcarpeta por categoría
    if (file.size > 20*1024*1024) { showToast('⚠️ El archivo supera 20 MB'); }
    else {
      showToast(`☁️ Subiendo a Drive / ${catLabel}…`);
      await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/octet-stream', base64Data:base64, pisoId:datos.pisoId, pisoNombre:piso?.nombre||'General', carpeta });
          if (res.ok && res.data && res.data.success) {
            const idx = OTRA_DOC.findIndex(x=>x.id===docId);
            if (idx !== -1) { OTRA_DOC[idx].fileUrl=res.data.url; OTRA_DOC[idx].fileName=file.name; }
            await api({ action:'update', sheet:'OtraDoc', id:docId, data:{ file_url:res.data.url, file_name:file.name }});
            showToast(`✅ Guardado en Drive / ${catLabel}`);
          } else showToast('⚠️ Error subiendo el archivo');
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
  }
  renderOtraDoc(document.getElementById('mainContent'));
}

async function eliminarOtraDoc(id) {
  const doc = OTRA_DOC.find(x=>x.id===id);
  if (!confirm(`¿Eliminar "${doc?doc.titulo:'este documento'}"?`)) return;
  closeSheet();
  const idx = OTRA_DOC.findIndex(x=>x.id===id);
  if (idx !== -1) OTRA_DOC.splice(idx, 1);
  await api({ action:'delete', sheet:'OtraDoc', id });
  if (doc && doc.fileUrl) await api({ action:'moveUrlToBorrados', fileUrl:doc.fileUrl });
  showToast('🗑️ Documento eliminado · archivo movido a BORRADOS en Drive');
  renderOtraDoc(document.getElementById('mainContent'));
}

async function subirDocOtraDoc(docId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,.jpg,.jpeg,.png,.doc,.docx';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const doc      = OTRA_DOC.find(x=>x.id===docId);
    const piso     = doc ? PISOS.find(p=>p.id===doc.pisoId) : null;
    const catLabel = doc ? getOtraDocCat(doc.categoria).label : 'Otros';
    const carpeta  = `Documentacion/${catLabel}`;
    if (file.size > 20*1024*1024) { showToast('⚠️ El archivo supera 20 MB'); return; }
    showToast(`☁️ Subiendo a Drive / ${catLabel}…`);
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const res = await api({ action:'upload', fileName:file.name, mimeType:file.type||'application/octet-stream', base64Data:base64, pisoId:doc?.pisoId||(PISOS[0]?.id), pisoNombre:piso?.nombre||'General', carpeta });
        if (res.ok && res.data && res.data.success) {
          const idx = OTRA_DOC.findIndex(x=>x.id===docId);
          if (idx !== -1) { OTRA_DOC[idx].fileUrl=res.data.url; OTRA_DOC[idx].fileName=file.name; }
          await api({ action:'update', sheet:'OtraDoc', id:docId, data:{ file_url:res.data.url, file_name:file.name }});
          showToast(`✅ Guardado en Drive / ${catLabel}`);
          renderOtraDoc(document.getElementById('mainContent'));
        } else showToast('⚠️ Error subiendo archivo');
        resolve();
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}
