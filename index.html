<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Gestión Alquileres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #c8a96e;
    --accent2: #e8c989;
    --danger: #e05555;
    --success: #4caf6e;
    --info: #5b9bd5;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 12px;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
  .header h1 { font-size: 20px; font-weight: 500; margin-top: 4px; }
  .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sync-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; transition: all 0.2s;
  }
  .sync-btn:active { transform: scale(0.92); background: var(--surface); }

  /* ── NAV TABS ── */
  .tabs {
    display: flex; gap: 4px; padding: 8px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 400; color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    border: 0.5px solid transparent;
  }
  .tab.active { background: var(--accent); color: #0a0a0a; font-weight: 500; }
  .tab:not(.active):active { background: var(--surface2); }

  /* ── MAIN ── */
  main { padding: 16px 20px; padding-bottom: calc(80px + var(--safe-bottom)); }

  /* ── PISOS GRID ── */
  .pisos-grid { display: flex; flex-direction: column; gap: 12px; }

  .piso-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.18s;
  }
  .piso-card:active { transform: scale(0.98); border-color: var(--border2); }
  .piso-card.selected { border-color: var(--accent); }

  .piso-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
  }
  .piso-icon {
    width: 42px; height: 42px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .piso-icon.turismo { background: rgba(200,169,110,0.15); }
  .piso-icon.residencial { background: rgba(91,155,213,0.15); }
  .piso-icon.oficina { background: rgba(76,175,110,0.15); }

  .piso-info { flex: 1; min-width: 0; }
  .piso-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .piso-addr { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .piso-badge {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-activo { background: rgba(76,175,110,0.15); color: #4caf6e; }
  .badge-vacio { background: rgba(136,136,136,0.12); color: var(--muted); }
  .badge-alerta { background: rgba(224,85,85,0.15); color: var(--danger); }

  .piso-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 0.5px solid var(--border);
  }
  .stat { padding: 10px 12px; text-align: center; }
  .stat:not(:last-child) { border-right: 0.5px solid var(--border); }
  .stat-val { font-size: 14px; font-weight: 500; font-family: var(--mono); }
  .stat-key { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-val.income { color: var(--success); }
  .stat-val.expense { color: var(--danger); }
  .stat-val.docs { color: var(--accent); }

  /* ── CARPETAS / DETAIL ── */
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--accent); cursor: pointer;
    margin-bottom: 16px; padding: 4px 0;
  }
  .back-btn:active { opacity: 0.7; }

  .detail-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .detail-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .carpetas-grid { display: flex; flex-direction: column; gap: 8px; }

  .carpeta-row {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer;
    transition: all 0.15s;
    text-decoration: none; color: inherit;
  }
  .carpeta-row:active { background: var(--surface2); border-color: var(--border2); }

  .folder-ico { font-size: 20px; width: 32px; text-align: center; }
  .carpeta-info { flex: 1; }
  .carpeta-name { font-size: 14px; font-weight: 400; }
  .carpeta-count { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .carpeta-arrow { color: var(--muted); font-size: 14px; }

  /* ── UPLOAD SECTION ── */
  .upload-section {
    background: var(--surface);
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 20px; margin-bottom: 16px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .upload-section:active { background: var(--surface2); border-color: var(--accent); }
  .upload-ico { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; font-weight: 500; }
  .upload-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  #fileInput { display: none; }

  /* ── NOTA FORM ── */
  .nota-form { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
  .nota-form textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 14px;
    resize: none; line-height: 1.6;
    min-height: 80px;
  }
  .nota-form textarea::placeholder { color: var(--muted); }
  .nota-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 10px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; font-family: var(--font);
    cursor: pointer; border: none; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); }
  .btn-danger { background: rgba(224,85,85,0.15); color: var(--danger); border: 0.5px solid rgba(224,85,85,0.25); }
  .btn-sm { padding: 7px 12px; font-size: 12px; }

  /* ── ACTIVIDAD / TIMELINE ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-top: 5px;
    flex-shrink: 0;
  }
  .dot-doc { background: var(--accent); }
  .dot-pago { background: var(--success); }
  .dot-gasto { background: var(--danger); }
  .dot-nota { background: var(--info); }
  .dot-incid { background: #ff9800; }

  .tl-content { flex: 1; }
  .tl-title { font-size: 13px; font-weight: 400; }
  .tl-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .tl-tag {
    font-size: 10px; font-family: var(--mono);
    padding: 2px 7px; border-radius: 10px; margin-left: 6px;
  }

  /* ── RESUMEN FINANCIERO ── */
  .fin-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .fin-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .fin-card .label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .fin-card .amount { font-size: 22px; font-weight: 500; font-family: var(--mono); }
  .fin-card .amount.green { color: var(--success); }
  .fin-card .amount.red { color: var(--danger); }
  .fin-card .amount.gold { color: var(--accent); }
  .fin-card .trend { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── INCIDENCIAS ── */
  .incidencia-item {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px;
  }
  .inc-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .inc-title { font-size: 14px; font-weight: 500; }
  .inc-status {
    font-size: 10px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 10px;
  }
  .status-open { background: rgba(224,85,85,0.15); color: var(--danger); }
  .status-progress { background: rgba(255,152,0,0.15); color: #ff9800; }
  .status-done { background: rgba(76,175,110,0.15); color: var(--success); }
  .inc-desc { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .inc-meta { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; gap: 12px; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: calc(80px + var(--safe-bottom) + 12px); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #0a0a0a;
    border: none; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(200,169,110,0.35);
    transition: all 0.2s; z-index: 50;
  }
  .fab:active { transform: scale(0.92); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: grid; grid-template-columns: repeat(4,1fr);
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px;
    transition: all 0.15s;
  }
  .nav-item:active { opacity: 0.7; }
  .nav-ico { font-size: 20px; }
  .nav-label { font-size: 10px; color: var(--muted); }
  .nav-item.active .nav-ico { filter: brightness(2.5) sepia(1) hue-rotate(10deg) saturate(3); }
  .nav-item.active .nav-label { color: var(--accent); }

  /* ── MODAL SHEET ── */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: all; }
  .sheet {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 0.5px solid var(--border2);
    border-radius: 18px 18px 0 0;
    padding: 0 20px calc(32px + var(--safe-bottom));
    z-index: 201; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 85dvh; overflow-y: auto;
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border2);
    border-radius: 2px; margin: 12px auto 20px;
  }
  .sheet-title { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
  .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sheet-opt {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .sheet-opt:active { border-color: var(--accent); }
  .sheet-opt .ico { font-size: 24px; margin-bottom: 8px; }
  .sheet-opt .lbl { font-size: 13px; font-weight: 400; }
  .sheet-opt .sublbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(96px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e1e1e; border: 0.5px solid var(--border2);
    border-radius: 20px; padding: 10px 18px;
    font-size: 13px; white-space: nowrap;
    z-index: 300; opacity: 0; transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SEARCH ── */
  .search-bar {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 14px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .search-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 14px;
    padding: 12px 0;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-ico { color: var(--muted); font-size: 16px; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 10px; font-family: var(--mono);
  }

  /* ── DRIVE LINK ── */
  .drive-link {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.15s;
    margin-bottom: 8px;
  }
  .drive-link:active { border-color: var(--accent); }
  .drive-link .dl-ico { font-size: 22px; width: 36px; text-align: center; }
  .drive-link .dl-info { flex: 1; }
  .drive-link .dl-name { font-size: 14px; }
  .drive-link .dl-path { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .drive-link .dl-arr { color: var(--muted); }

  /* ── FIANZA ── */
  .fianza-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
  }
  .fianza-card-header {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .fianza-card-header:active { background: var(--surface2); }
  .fianza-pill {
    font-size: 10px; font-family: var(--mono); padding: 3px 9px;
    border-radius: 10px; flex-shrink: 0;
  }
  .fianza-pill.deposito { background: rgba(200,169,110,0.15); color: var(--accent); }
  .fianza-pill.devolucion { background: rgba(91,155,213,0.15); color: var(--info); }
  .fianza-pill.done { background: rgba(76,175,110,0.15); color: var(--success); }
  .fianza-pill.blocked { background: rgba(224,85,85,0.15); color: var(--danger); }

  .fianza-progress-bar {
    height: 3px; background: var(--surface2);
    margin: 0 16px 14px;
  }
  .fianza-progress-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.4s ease;
  }
  .fill-deposito { background: var(--accent); }
  .fill-devolucion { background: var(--info); }
  .fill-done { background: var(--success); }

  .fianza-steps { padding: 0 12px 14px; }

  .step-item {
    display: flex; gap: 0; position: relative;
  }
  .step-left {
    display: flex; flex-direction: column; align-items: center;
    width: 32px; flex-shrink: 0;
  }
  .step-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    flex-shrink: 0; background: var(--surface);
    position: relative; z-index: 1;
  }
  .step-check.done { background: var(--success); border-color: var(--success); }
  .step-check.done::after { content: '✓'; color: #0a0a0a; font-weight: 700; font-size: 12px; }
  .step-check.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,169,110,0.15); }
  .step-check.blocked-step { border-color: rgba(224,85,85,0.4); opacity: 0.5; cursor: not-allowed; }

  .step-line {
    width: 1.5px; flex: 1; min-height: 12px;
    background: var(--border); margin: 2px 0;
  }
  .step-line.done { background: var(--success); }

  .step-body {
    flex: 1; padding: 2px 0 16px 10px;
  }
  .step-title {
    font-size: 13px; font-weight: 500; line-height: 1.3;
    display: flex; align-items: center; gap: 8px;
  }
  .step-title.done-text { color: var(--muted); text-decoration: line-through; }
  .step-meta { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .step-date-badge {
    font-size: 10px; font-family: var(--mono);
    padding: 2px 7px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: var(--muted); flex-shrink: 0;
  }
  .step-date-badge.urgent { background: rgba(224,85,85,0.15); color: var(--danger); }
  .step-date-badge.ok { background: rgba(76,175,110,0.12); color: var(--success); }

  .step-actions {
    display: flex; gap: 6px; margin-top: 8px;
  }

  .fianza-summary {
    border-top: 0.5px solid var(--border);
    padding: 10px 16px;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .fsumm-item { text-align: center; }
  .fsumm-item:not(:last-child) { border-right: 0.5px solid var(--border); }
  .fsumm-val { font-size: 14px; font-weight: 500; font-family: var(--mono); }
  .fsumm-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  .fianza-nueva-btn {
    background: var(--surface); border: 0.5px dashed var(--border2);
    border-radius: var(--radius); padding: 16px; text-align: center;
    cursor: pointer; transition: all 0.15s; margin-bottom: 14px;
  }
  .fianza-nueva-btn:active { border-color: var(--accent); }
  .fianza-nueva-btn .ico { font-size: 20px; margin-bottom: 6px; }
  .fianza-nueva-btn .lbl { font-size: 13px; font-weight: 500; }
  .fianza-nueva-btn .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── SUMINISTROS ── */
  .sumi-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  }
  .sumi-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .sumi-header:active { background: var(--surface2); }
  .sumi-ico-wrap {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .sumi-luz { background: rgba(250,199,117,0.15); }
  .sumi-agua { background: rgba(91,155,213,0.15); }
  .sumi-gas { background: rgba(224,85,85,0.15); }
  .sumi-tipo-pill {
    font-size: 10px; font-family: var(--mono); padding: 3px 9px;
    border-radius: 10px;
  }
  .sumi-tipo-pill.alta { background: rgba(200,169,110,0.15); color: var(--accent); }
  .sumi-tipo-pill.baja { background: rgba(91,155,213,0.15); color: var(--info); }
  .sumi-tipo-pill.done { background: rgba(76,175,110,0.15); color: var(--success); }

  .sumi-tabs {
    display: flex; border-bottom: 0.5px solid var(--border);
    padding: 0 12px;
  }
  .sumi-tab {
    flex: 1; text-align: center; padding: 10px 4px;
    font-size: 13px; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .sumi-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .sumi-steps-wrap { padding: 12px 12px 4px; }

  .sumi-nueva-btn {
    background: var(--surface); border: 0.5px dashed var(--border2);
    border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s;
  }
  .sumi-nueva-btn:active { border-color: var(--accent); }
  .sumi-nueva-btn .sni { font-size: 22px; }
  .sumi-nueva-btn .snl { font-size: 14px; font-weight: 500; }
  .sumi-nueva-btn .sns { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .sumi-contrato-box {
    margin: 0 12px 12px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 12px;
  }
  .sumi-contrato-box .scl { color: var(--muted); margin-bottom: 4px; }
  .sumi-contrato-box .scv { font-family: var(--mono); color: var(--accent); }

  /* ── CONTRATO NUEVO ── */
  .contrato-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  }
  .contrato-header {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .contrato-header:active { background: var(--surface2); }
  .fase-badge {
    font-size: 10px; font-family: var(--mono); padding: 2px 8px;
    border-radius: 10px; flex-shrink: 0;
  }
  .fase-0 { background: rgba(136,136,136,0.15); color: var(--muted); }
  .fase-1 { background: rgba(200,169,110,0.15); color: var(--accent); }
  .fase-2 { background: rgba(91,155,213,0.15); color: var(--info); }
  .fase-3 { background: rgba(76,175,110,0.15); color: var(--success); }
  .contrato-section-label {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); font-family: var(--mono);
    padding: 12px 16px 6px; border-top: 0.5px solid var(--border);
  }

  /* ── MANTENIMIENTO ── */
  .mant-resumen {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px;
  }
  .mant-stat {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 10px; text-align: center;
  }
  .mant-stat .mv { font-size: 18px; font-weight: 500; font-family: var(--mono); }
  .mant-stat .mk { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

  .averia-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s;
  }
  .averia-card:active { border-color: var(--border2); }
  .averia-card.expanded { border-color: var(--border2); }
  .averia-top {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px;
  }
  .averia-cat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .cat-fontaneria { background: #5b9bd5; }
  .cat-electricidad { background: #fac775; }
  .cat-estructura { background: #e05555; }
  .cat-electrodomesticos { background: #4caf6e; }
  .cat-pintura { background: #c8a96e; }
  .cat-otros { background: #888; }

  .averia-info { flex: 1; min-width: 0; }
  .averia-titulo { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .averia-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .averia-importe {
    font-size: 15px; font-weight: 500; font-family: var(--mono);
    color: var(--danger); flex-shrink: 0;
  }
  .averia-detail {
    border-top: 0.5px solid var(--border); padding: 12px 14px;
    display: none;
  }
  .averia-detail.open { display: block; }
  .averia-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
  .averia-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;
  }
  .averia-field { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
  .averia-field .afl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .averia-field .afv { font-size: 13px; font-family: var(--mono); }

  .cat-filter-row {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    padding-bottom: 4px; margin-bottom: 14px;
  }
  .cat-filter-row::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
    font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2);
    background: var(--surface); transition: all 0.15s; white-space: nowrap;
  }
  .cat-chip.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .cat-chip:active { opacity: 0.7; }

  .nueva-averia-form {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    display: none;
  }
  .nueva-averia-form.open { display: block; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  .form-input {
    width: 100%; background: var(--surface2);
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 10px 12px; color: var(--text);
    font-family: var(--font); font-size: 14px; outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

  /* ── GASTOS FISCAL ── */
  .gasto-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s;
  }
  .gasto-card:active { border-color: var(--border2); }
  .gasto-card.expanded { border-color: var(--border2); }
  .gasto-top {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px;
  }
  .gasto-cat-ico {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .gasto-info { flex: 1; min-width: 0; }
  .gasto-titulo { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gasto-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .gasto-importe { font-size: 15px; font-weight: 500; font-family: var(--mono); color: var(--danger); flex-shrink: 0; }
  .gasto-detail { border-top: 0.5px solid var(--border); padding: 12px 14px; display: none; }
  .gasto-detail.open { display: block; }
  .gasto-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .gasto-field { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
  .gasto-field .gfl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .gasto-field .gfv { font-size: 12px; font-family: var(--mono); }
  .fiscal-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-family: var(--mono);
  }
  .fiscal-si { background: rgba(76,175,110,0.15); color: var(--success); }
  .fiscal-no { background: rgba(136,136,136,0.12); color: var(--muted); }
  .fiscal-parcial { background: rgba(200,169,110,0.15); color: var(--accent); }

  .resumen-fiscal {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  }
  .resumen-fiscal-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: var(--text); }
  .resumen-fiscal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px;
  }
  .resumen-fiscal-row:last-child { border-bottom: none; }
  .resumen-fiscal-row .cat { color: var(--muted); }
  .resumen-fiscal-row .imp { font-family: var(--mono); font-weight: 500; color: var(--danger); }
  .resumen-fiscal-total {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2);
    font-size: 14px; font-weight: 500;
  }
  .anio-selector {
    display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none;
  }
  .anio-chip {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-family: var(--mono); cursor: pointer;
    border: 0.5px solid var(--border2); background: var(--surface);
    transition: all 0.15s;
  }
  .anio-chip.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 500; }

  /* ── SCROLLBAR THIN ── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .ei { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── HIGHLIGHT ROW ── */
  @keyframes pulse-border { 0%,100%{border-color:var(--border)} 50%{border-color:var(--accent)} }
  .uploading { animation: pulse-border 1s ease-in-out infinite; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <span class="logo">Cartera Inmobiliaria</span>
    <div class="sync-btn" onclick="showToast('☁️ Sincronizado con Drive')">⟳</div>
  </div>
  <h1 id="pageTitle">Mis Propiedades</h1>
  <div class="subtitle" id="pageSubtitle">3 activos · 2 ocupados</div>
  <div class="tabs" id="mainTabs">
    <div class="tab active" onclick="setTab(this,'pisos')">Propiedades</div>
    <div class="tab" onclick="setTab(this,'finanzas')">Finanzas</div>
    <div class="tab" onclick="setTab(this,'fianzas')">Fianzas</div>
    <div class="tab" onclick="setTab(this,'suministros')">Suministros</div>
    <div class="tab" onclick="setTab(this,'contrato')">Contrato</div>
    <div class="tab" onclick="setTab(this,'gastos')">Gastos</div>
    <div class="tab" onclick="setTab(this,'otradoc')">Otra documentación</div>
    <div class="tab" onclick="setTab(this,'actividad')">Actividad</div>
  </div>
</header>

<main id="mainContent"></main>

<!-- FAB -->
<button class="fab" id="fab" onclick="openSheet()">+</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="navTo('home')">
    <span class="nav-ico">🏠</span>
    <span class="nav-label">Inicio</span>
  </div>
  <div class="nav-item" onclick="navTo('docs')">
    <span class="nav-ico">📄</span>
    <span class="nav-label">Documentos</span>
  </div>
  <div class="nav-item" onclick="navTo('drive')">
    <span class="nav-ico">☁️</span>
    <span class="nav-label">Drive</span>
  </div>
  <div class="nav-item" onclick="navTo('config')">
    <span class="nav-ico">⚙️</span>
    <span class="nav-label">Config</span>
  </div>
</nav>

<!-- Sheet -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Añadir documento</div>
  <div id="sheetContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- File input -->
<input type="file" id="fileInput" multiple accept="*/*" onchange="handleFiles(this)">

<script>
const PISOS = [];

const ACTIVIDAD = [];

let currentView = 'pisos';
let currentPiso = null;
let currentCarpeta = null;
let selectedPisoForUpload = null;

function fmt(n) { return n.toLocaleString('es-ES') + ' €'; }

// ── RENDER MAIN ──
function render() {
  const el = document.getElementById('mainContent');
  if (currentView === 'pisos') renderPisos(el);
  else if (currentView === 'piso-detail') renderPisoDetail(el);
  else if (currentView === 'carpeta') renderCarpeta(el);
  else if (currentView === 'finanzas') renderFinanzas(el);
  else if (currentView === 'fianzas') renderFianzas(el);
  else if (currentView === 'suministros') renderSuministros(el);
  else if (currentView === 'contrato') renderContrato(el);
  else if (currentView === 'gastos') renderGastos(el);
  else if (currentView === 'otradoc') renderOtraDoc(el);
  else if (currentView === 'actividad') renderActividad(el);
  else if (currentView === 'docs') renderDocs(el);
  else if (currentView === 'drive') renderDrive(el);
  else if (currentView === 'config') renderConfig(el);
}

// ── PISOS LIST ──
function renderPisos(el) {
  const activos = PISOS.filter(p=>p.estado==='activo').length;
  let html = `
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="abrirFormPiso()">
      + Nueva propiedad
    </button>
    <div class="pisos-grid">`;
  if (PISOS.length === 0) {
    html += `<div class="empty"><div class="ei">🏠</div><p>No hay propiedades aún.<br>Pulsa "Nueva propiedad" para empezar.</p></div>`;
  }
  PISOS.forEach(p => {
    const badgeClass = p.estado === 'activo' ? 'badge-activo' : p.estado === 'vacio' ? 'badge-vacio' : 'badge-alerta';
    const badgeText = p.estado === 'activo' ? (p.inquilino ? `${p.inquilino}` : 'Turístico activo') : 'Vacío';
    html += `
    <div class="piso-card" onclick="openPiso('${p.id}')">
      <div class="piso-header">
        <div class="piso-icon ${p.tipo}">${p.ico}</div>
        <div class="piso-info">
          <div class="piso-name">${p.nombre}</div>
          <div class="piso-addr">${p.dir}</div>
        </div>
        <span class="piso-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="piso-stats">
        <div class="stat"><div class="stat-val income">${fmt(Number(p.ingresos)||0)}</div><div class="stat-key">Ingresos</div></div>
        <div class="stat"><div class="stat-val expense">-${fmt(Number(p.gastos)||0)}</div><div class="stat-key">Gastos mes</div></div>
        <div class="stat"><div class="stat-val" style="color:${(Number(p.ingresos)||0)-(Number(p.gastos)||0)>=0?'var(--success)':'var(--danger)'}">${fmt((Number(p.ingresos)||0)-(Number(p.gastos)||0))}</div><div class="stat-key">Neto</div></div>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
  document.getElementById('pageSubtitle').textContent = `${PISOS.length} propiedad${PISOS.length!==1?'es':''} · ${activos} activa${activos!==1?'s':''}`;
}

// ── FORMULARIO NUEVA / EDITAR PROPIEDAD ──
function abrirFormPiso(id) {
  const p = id ? PISOS.find(x=>x.id===id) : null;
  const titulo = p ? '✏️ Editar propiedad' : '🏠 Nueva propiedad';
  const ICONOS = ['🏠','🏡','🏢','🏗️','🏬','🏪','🏨','🏦'];
  const icosHtml = ICONOS.map(i=>`
    <div onclick="selIco(this,'${i}')" style="width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:1.5px solid ${p&&p.ico===i?'var(--accent)':'var(--border)'};background:${p&&p.ico===i?'rgba(200,169,110,0.15)':'var(--surface2)'}" data-ico="${i}">${i}</div>`).join('');
  document.getElementById('sheetTitle').textContent = titulo;
  document.getElementById('sheetContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label class="form-label">Icono</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="icoGrid">${icosHtml}</div>
        <input type="hidden" id="fp_ico" value="${p?p.ico:'🏠'}">
      </div>
      <div>
        <label class="form-label">Nombre de la propiedad *</label>
        <input id="fp_nombre" type="text" class="form-input" placeholder="Ej: Piso Delicias, Apt. Turístico…" value="${p?p.nombre:''}">
      </div>
      <div>
        <label class="form-label">Dirección completa</label>
        <input id="fp_dir" type="text" class="form-input" placeholder="Calle, número, piso · Ciudad" value="${p?p.dir:''}">
      </div>
      <div>
        <label class="form-label">Tipo de propiedad</label>
        <select id="fp_tipo" class="form-input">
          <option value="residencial" ${!p||p.tipo==='residencial'?'selected':''}>🏢 Residencial (alquiler habitual)</option>
          <option value="turismo" ${p&&p.tipo==='turismo'?'selected':''}>🏡 Turístico (vacacional)</option>
          <option value="oficina" ${p&&p.tipo==='oficina'?'selected':''}>🏗️ Oficina / Local comercial</option>
        </select>
      </div>
      <div>
        <label class="form-label">Estado</label>
        <select id="fp_estado" class="form-input">
          <option value="activo" ${!p||p.estado==='activo'?'selected':''}>✅ Activo / Ocupado</option>
          <option value="vacio" ${p&&p.estado==='vacio'?'selected':''}>⬜ Vacío / Disponible</option>
          <option value="obras" ${p&&p.estado==='obras'?'selected':''}>🔧 En obras / No disponible</option>
        </select>
      </div>
      <div class="form-row-2" style="margin-bottom:0">
        <div>
          <label class="form-label">Inquilino actual</label>
          <input id="fp_inquilino" type="text" class="form-input" placeholder="Nombre y apellido" value="${p&&p.inquilino?p.inquilino:''}">
        </div>
        <div>
          <label class="form-label">Renta mensual (€)</label>
          <input id="fp_renta" type="number" class="form-input" placeholder="0" value="${p?p.renta:0}">
        </div>
      </div>
      <div class="form-row-2" style="margin-bottom:0">
        <div>
          <label class="form-label">Ingresos mes (€)</label>
          <input id="fp_ingresos" type="number" class="form-input" placeholder="0" value="${p?p.ingresos:0}">
        </div>
        <div>
          <label class="form-label">Gastos mes (€)</label>
          <input id="fp_gastos" type="number" class="form-input" placeholder="0" value="${p?p.gastos:0}">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="guardarPiso('${p?p.id:''}')">
          💾 ${p?'Guardar cambios':'Crear propiedad'}
        </button>
        ${p?`<button class="btn btn-danger btn-sm" onclick="confirmarEliminarPiso('${p.id}')">🗑️</button>`:''}
      </div>
    </div>`;
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function selIco(el, ico) {
  document.querySelectorAll('#icoGrid > div').forEach(d => {
    d.style.border = '1.5px solid var(--border)';
    d.style.background = 'var(--surface2)';
  });
  el.style.border = '1.5px solid var(--accent)';
  el.style.background = 'rgba(200,169,110,0.15)';
  document.getElementById('fp_ico').value = ico;
}


function confirmarEliminarPiso(id) {
  const p = PISOS.find(x=>x.id===id);
  document.getElementById('sheetTitle').textContent = '⚠️ Eliminar propiedad';
  document.getElementById('sheetContent').innerHTML = `
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:40px;margin-bottom:12px">${p.ico}</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px">${p.nombre}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6">
        Se eliminará esta propiedad de la app y de Google Sheets.<br>
        Los datos asociados (averías, fianzas…) quedarán en Sheets.
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeSheet()">Cancelar</button>
        <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="eliminarPiso('${id}')">🗑️ Eliminar</button>
      </div>
    </div>`;
}


// ── PISO DETAIL ──
function openPiso(id) {
  currentPiso = PISOS.find(p => p.id === id);
  currentView = 'piso-detail';
  render();
}

function renderPisoDetail(el) {
  const p = currentPiso;
  const tieneCarpetas = p.driveUrl ? true : false;

  let html = `
    <div class="back-btn" onclick="backToList()">← Propiedades</div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
      <div class="detail-title">${p.ico} ${p.nombre}</div>
      <div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px;margin-top:4px">
        <button class="btn btn-ghost btn-sm" onclick="abrirFormPiso('${p.id}')">✏️ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmarEliminarPiso('${p.id}')">🗑️</button>
      </div>
    </div>
    <div class="detail-subtitle">${p.dir}</div>`;

  // Estado carpetas Drive
  if (tieneCarpetas) {
    html += `
    <div style="background:rgba(76,175,110,0.1);border:0.5px solid rgba(76,175,110,0.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <span>📁</span>
      <div style="flex:1;font-size:12px;color:var(--success)">Carpetas creadas en Drive</div>
      <a href="${p.driveUrl}" target="_blank"><button class="btn btn-ghost btn-sm">Abrir ↗</button></a>
    </div>`;
  } else {
    html += `
    <div id="driveStatus" style="background:rgba(200,169,110,0.1);border:0.5px solid rgba(200,169,110,0.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <span>📁</span>
      <div style="flex:1;font-size:12px;color:var(--muted)">Carpetas no creadas en Drive aún</div>
      <button class="btn btn-primary btn-sm" onclick="crearCarpetasManual('${p.id}')">Crear ahora</button>
    </div>`;
  }

  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
    <div class="section-label" style="margin:0">Carpetas</div>
    <button class="btn btn-ghost btn-sm" onclick="renderPisoDetail(document.getElementById('mainContent'))" title="Actualizar contadores desde Drive">⟳ Actualizar</button>
  </div>
    <div class="carpetas-grid" id="carpetasGrid_${p.id}">`;
  p.carpetas.forEach(c => {
    html += `
      <div class="carpeta-row" onclick="openCarpeta('${c.id}')">
        <span class="folder-ico">${c.ico}</span>
        <div class="carpeta-info">
          <div class="carpeta-name">${c.nombre}</div>
          <div class="carpeta-count" id="count_${p.id}_${c.id}">${c.count!=null?c.count:'…'} archivos</div>
        </div>
        <span class="carpeta-arrow">›</span>
      </div>`;
  });
  html += `</div>
    <div class="section-label" style="margin-top:24px">Acciones rápidas</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="openUploadFor('${p.id}')">📎 Subir archivo</button>
      <button class="btn btn-ghost" onclick="openNota('${p.id}')">📝 Añadir nota</button>
      <button class="btn btn-ghost" onclick="openIncidencia('${p.id}')">🔧 Incidencia</button>
    </div>`;
  el.innerHTML = html;
  selectedPisoForUpload = p.id;

  // Actualizar contadores en tiempo real desde Drive
  // Usamos Promise.all para actualizar todos a la vez cuando todos respondan
  const pisoId = p.id;
  const carpetasSnap = p.carpetas.map(c => ({ id: c.id, nombre: c.nombre }));

  const pisoNombre = p.nombre;
  let totalActualizado = 0;
  let pendientes = carpetasSnap.length;

  carpetasSnap.forEach(function(c) {
    api({ action:'getFiles', pisoId: pisoId, pisoNombre: pisoNombre, carpeta: c.nombre })
      .then(function(res) {
        const count = (res && res.ok && res.data && res.data.files) ? res.data.files.length : 0;
        totalActualizado += count;
        // Actualizar en memoria
        const pisoIdx = PISOS.findIndex(x => x.id === pisoId);
        if (pisoIdx !== -1) {
          const ci = PISOS[pisoIdx].carpetas.findIndex(x => x.id === c.id);
          if (ci !== -1) PISOS[pisoIdx].carpetas[ci].count = count;
        }
        // Actualizar el elemento en pantalla inmediatamente
        const countEl = document.getElementById('count_' + pisoId + '_' + c.id);
        if (countEl) {
          countEl.textContent = count + ' archivo' + (count !== 1 ? 's' : '');
        }
        // Cuando terminen todas las carpetas, mostrar confirmación
        pendientes--;
        if (pendientes === 0) {
          showToast('✅ Contadores actualizados desde Drive');
        }
      })
      .catch(function(e) {
        pendientes--;
        console.warn('Error carpeta ' + c.nombre + ':', e);
      });
  });
}

// ── CREAR CARPETAS MANUALMENTE PARA UN PISO EXISTENTE ──
async function crearCarpetasManual(pisoId) {
  const p = PISOS.find(x => x.id === pisoId);
  if (!p) return;

  const btn = document.querySelector('#driveStatus button');
  if (btn) { btn.textContent = '⏳ Creando…'; btn.disabled = true; }

  showToast('📁 Creando carpetas en Drive…');

  const carpetasNombres = p.carpetas.map(c => c.nombre);
  const res = await api({
    action:     'createFolders',
    pisoId:     pisoId,
    pisoNombre: p.nombre,
    carpetas:   carpetasNombres,
  });

  if (res.ok && res.data && res.data.success) {
    // Guardar URL en el piso local y en Sheets
    const idx = PISOS.findIndex(x => x.id === pisoId);
    if (idx !== -1) PISOS[idx].driveUrl = res.data.pisoFolder;
    currentPiso = PISOS[idx];

    await api({ action:'update', sheet:'Pisos', id: pisoId, data:{ drive_url: res.data.pisoFolder } });

    showToast(`✅ ${carpetasNombres.length} carpetas creadas en Drive`);
    renderPisoDetail(document.getElementById('mainContent'));
  } else {
    const err = res.error || (res.data && res.data.error) || 'Error desconocido';
    console.error('createFolders error:', err);
    showToast(`⚠️ Error creando carpetas: ${String(err).substring(0,50)}`);
    if (btn) { btn.textContent = 'Reintentar'; btn.disabled = false; }
  }
}

async function registrarCobro() {
  const pisoId   = document.getElementById('cobro_piso')?.value;
  const importe  = parseFloat(document.getElementById('cobro_importe')?.value)||0;
  const fecha    = document.getElementById('cobro_fecha')?.value || new Date().toISOString().split('T')[0];
  const concepto = document.getElementById('cobro_concepto')?.value?.trim() || 'Renta';
  if (!pisoId)          { showToast('⚠️ Selecciona una propiedad'); return; }
  if (importe <= 0)     { showToast('⚠️ Introduce el importe recibido'); return; }
  const idx = PISOS.findIndex(p=>p.id===pisoId);
  if (idx === -1)       { showToast('⚠️ Propiedad no encontrada'); return; }
  const piso = PISOS[idx];
  PISOS[idx].ingresos = importe;
  showToast('💾 Registrando cobro…');
  await api({ action:'update', sheet:'Pisos', id:pisoId, data:{ ingresos:importe }});
  await api({ action:'write', sheet:'Actividad', data:{
    id:'act_'+Date.now(), piso_id:pisoId, tipo:'pago',
    titulo:concepto+' · '+piso.nombre,
    meta:'Cobrado '+fmt(importe)+' · '+fecha,
    tag:'+'+fmt(importe), tag_clase:'green',
    creado_en:new Date().toISOString(),
  }});
  ACTIVIDAD.unshift({ tipo:'pago', piso:pisoId, titulo:concepto, meta:fecha+' · '+piso.nombre, tag:'+'+fmt(importe), tagClass:'green' });
  showToast('✅ Cobro de '+fmt(importe)+' registrado');
  renderFinanzas(document.getElementById('mainContent'));
}

function navTo(page) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  document.getElementById('mainTabs').style.display = page==='home'?'flex':'none';

// ── FIANZAS DATA ──
const FIANZAS = [];

let expandedFianza = null;

function getFianzaProgress(f) {
  const done = f.pasos.filter(p=>p.hecho).length;
  return { done, total: f.pasos.length, pct: Math.round((done/f.pasos.length)*100) };
}

function toggleFianzaStep(fid, sid) {
  const f = FIANZAS.find(x=>x.id===fid);
  const s = f.pasos.find(x=>x.id===sid);
  s.hecho = !s.hecho;
  s.fechaHecho = s.hecho ? new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : null;
  renderFianzas(document.getElementById('mainContent'));
  showToast(s.hecho ? '✅ Paso completado' : '↩ Paso desmarcado');
}

function toggleFianzaExpand(fid) {
  expandedFianza = expandedFianza === fid ? null : fid;
  renderFianzas(document.getElementById('mainContent'));
}

async function guardarNuevaFianza(tipo) {
  const inquilino = document.getElementById('nf_inquilino')?.value?.trim();
  if (!inquilino) { showToast('⚠️ El nombre del inquilino es obligatorio'); return; }
  const pisoId  = document.getElementById('nf_piso').value;
  const importe = parseFloat(document.getElementById('nf_importe').value) || 0;
  const fecha   = document.getElementById('nf_fecha').value;
  const exp     = document.getElementById('nf_exp')?.value?.trim() || null;

  closeSheet();
  showToast('💾 Guardando fianza…');

  const id = 'f_' + Date.now();
  // Pasos por defecto según tipo
  const pasos = tipo === 'deposito' ? [
    { id:'s1', titulo:'Firma del contrato de arrendamiento', meta:'Contrato firmado por ambas partes', plazo:'Día 0', doc:true, hecho:false, fechaHecho:null },
    { id:'s2', titulo:'Cobro de la fianza al inquilino', meta:`${importe} €`, plazo:'Día 0', doc:false, hecho:false, fechaHecho:null },
    { id:'s3', titulo:'Cumplimentar impreso de depósito DGA', meta:'Modelo oficial Aragón', plazo:'≤ 30 días', doc:true, hecho:false, fechaHecho:null },
    { id:'s4', titulo:'Ingreso en entidad colaboradora (Ibercaja/CAI)', meta:'Guardar justificante bancario', plazo:'≤ 30 días', doc:true, hecho:false, fechaHecho:null },
    { id:'s5', titulo:'Presentación en Registro de Fianzas DGA', meta:'Impreso + justificante bancario', plazo:'≤ 30 días', doc:true, hecho:false, fechaHecho:null },
    { id:'s6', titulo:'Recepción del resguardo de depósito', meta:'PDF con nº de expediente', plazo:'Tras presentación', doc:true, hecho:false, fechaHecho:null },
    { id:'s7', titulo:'Entrega de copia del resguardo al inquilino', meta:'El inquilino debe tener el justificante', plazo:'Tras recepción', doc:false, hecho:false, fechaHecho:null },
    { id:'s8', titulo:'Archivar documentación en Drive', meta:'Contrato + impreso + resguardo DGA', plazo:'Completado', doc:false, hecho:false, fechaHecho:null },
  ] : [
    { id:'d1', titulo:'Inspección del piso y entrega de llaves', meta:'Acta + fotos firmada por ambas partes', plazo:'Día salida', doc:true, hecho:false, fechaHecho:null },
    { id:'d2', titulo:'Lectura y comunicación de contadores', meta:'Luz, agua, gas', plazo:'Día salida', doc:false, hecho:false, fechaHecho:null },
    { id:'d3', titulo:'Valoración de desperfectos si los hay', meta:'Presupuesto y notificación escrita', plazo:'≤ 10 días', doc:true, hecho:false, fechaHecho:null },
    { id:'d4', titulo:'Solicitud de cancelación a la DGA', meta:'Impreso + nº expediente + IBAN inquilino', plazo:'≤ 1 mes', doc:true, hecho:false, fechaHecho:null },
    { id:'d5', titulo:'Resolución DGA y transferencia al inquilino', meta:'Plazo legal: 1 mes desde solicitud', plazo:'≤ 1 mes', doc:true, hecho:false, fechaHecho:null },
    { id:'d6', titulo:'Confirmación de recepción del inquilino', meta:'Email o mensaje confirmando el cobro', plazo:'Tras transferencia', doc:false, hecho:false, fechaHecho:null },
    { id:'d7', titulo:'Archivar documentación en Drive', meta:'Resolución DGA + confirmación inquilino', plazo:'Cierre', doc:false, hecho:false, fechaHecho:null },
  ];

  const nuevaFianza = { id, pisoId, tipo, inquilino, importe, fechaInicio: fecha, numExpediente: exp, pasos, docs: [] };
  FIANZAS.push(nuevaFianza);

  // Guardar en Sheets
  await api({ action:'write', sheet:'Fianzas', data:{
    id, piso_id: pisoId, tipo, inquilino, importe, fecha_inicio: fecha,
    num_expediente: exp || '', creado_en: new Date().toISOString().split('T')[0]
  }});
  // Guardar pasos
  for (let i = 0; i < pasos.length; i++) {
    const p = pasos[i];
    await api({ action:'write', sheet:'Fianza_Pasos', data:{
      id: p.id, fianza_id: id, titulo: p.titulo, meta: p.meta,
      plazo: p.plazo, requiere_doc: p.doc, hecho: false, fecha_hecho: '', orden: i
    }});
  }

  showToast(`✅ Fianza creada · ${pasos.length} pasos del checklist listos`);

  // Subir documentos adjuntos si se seleccionaron
  const piso = PISOS.find(p=>p.id===pisoId);
  await subirAdjuntos('nf', pisoId, piso?.nombre, 'Fianzas');

  renderFianzas(document.getElementById('mainContent'));
}

function renderFianzas(el) {
  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <div class="fianza-nueva-btn" onclick="openNuevaFianza('deposito')">
        <div class="ico">📥</div>
        <div class="lbl">Nuevo depósito</div>
        <div class="sub">Nuevo contrato</div>
      </div>
      <div class="fianza-nueva-btn" onclick="openNuevaFianza('devolucion')">
        <div class="ico">📤</div>
        <div class="lbl">Devolución</div>
        <div class="sub">Fin de contrato</div>
      </div>
    </div>
    <div class="section-label">Procesos activos</div>`;

  if (FIANZAS.length === 0) {
    html += `<div class="empty"><div class="ei">🏦</div><p>No hay fianzas registradas aún.<br>Pulsa uno de los botones de arriba para empezar.</p></div>`;
    el.innerHTML = html;
    return;
  }

  FIANZAS.forEach(f => {
    const { done, total, pct } = getFianzaProgress(f);
    const isExpanded = expandedFianza === f.id;
    const isDone = pct === 100;
    const p = PISOS.find(x => x.id === f.pisoId);
    const pisoLabel = p ? `${p.ico} ${p.nombre.split(' ').slice(0,2).join(' ')}` : '🏠 Propiedad';
    const pillClass = isDone ? 'done' : f.tipo;
    const pillText  = isDone ? 'Completado' : f.tipo === 'deposito' ? 'Depósito' : 'Devolución';
    const fillClass = isDone ? 'fill-done' : f.tipo === 'deposito' ? 'fill-deposito' : 'fill-devolucion';

    html += `<div class="fianza-card">
      <div class="fianza-card-header" onclick="toggleFianzaExpand('${f.id}')">
        <div style="font-size:20px">${f.tipo==='deposito'?'📥':'📤'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${f.inquilino||'Sin nombre'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${pisoLabel} · ${fmt(f.importe)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span class="fianza-pill ${pillClass}">${pillText}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)">${done}/${total} pasos</div>
        </div>
        <div style="color:var(--muted);font-size:14px;margin-left:8px;transition:transform 0.2s;transform:rotate(${isExpanded?'90':'0'}deg)">›</div>
      </div>
      <div class="fianza-progress-bar">
        <div class="fianza-progress-fill ${fillClass}" style="width:${pct}%"></div>
      </div>`;

    if (isExpanded) {
      // Documentos adjuntos de la fianza
      const docs = f.docs || [];
      html += `<div style="padding:0 14px 10px">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Documentos adjuntos</div>`;
      if (docs.length > 0) {
        docs.forEach(doc => {
          html += `<div style="background:var(--surface2);border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:4px">

      <div class="fsumm-item">
        <div class="fsumm-val">${pct}%</div>
        <div class="fsumm-key">Progreso</div>

      <div class="fsumm-item" style="cursor:pointer" onclick="editarFianza('${f.id}')">
        <div class="fsumm-val">✏️</div>
        <div class="fsumm-key">Editar</div>
      </div>
    </div></div>`;
  });

  // Leyenda informativa
  html += `
    <div class="section-label" style="margin-top:8px">Plazos legales (Aragón)</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.9;color:var(--muted)">

  el.innerHTML = html;
}

const SUMINISTROS = [];

let expandedSumi = 'su1';

function getSumiProgress(s, tipo) {
  const steps = tipo === 'alta' ? s.altaSteps : s.bajaSteps;
  const done = steps.filter(x=>x.hecho).length;
  return { done, total: steps.length, pct: Math.round((done/steps.length)*100) };
}

function toggleSumiExpand(id) {
  expandedSumi = expandedSumi === id ? null : id;
  renderSuministros(document.getElementById('mainContent'));
}

function setSumiTab(id, tab) {
  const s = SUMINISTROS.find(x=>x.id===id);
  s.tabActiva = tab;
  renderSuministros(document.getElementById('mainContent'));
}

function toggleSumiStep(sid, tipo, stepId) {
  const s = SUMINISTROS.find(x=>x.id===sid);
  const steps = tipo === 'alta' ? s.altaSteps : s.bajaSteps;
  const step = steps.find(x=>x.id===stepId);
  const idx = steps.indexOf(step);
  const prevDone = idx === 0 || steps[idx-1].hecho;
  if (!step.hecho && !prevDone) { showToast('⚠️ Completa el paso anterior primero'); return; }
  step.hecho = !step.hecho;
  step.fechaHecho = step.hecho ? new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : null;
  renderSuministros(document.getElementById('mainContent'));
  showToast(step.hecho ? '✅ Paso completado' : '↩ Desmarcado');
}

function renderSumiSteps(sid, tipo) {
  const s = SUMINISTROS.find(x=>x.id===sid);
  const steps = tipo === 'alta' ? s.altaSteps : s.bajaSteps;
  let html = '<div class="sumi-steps-wrap">';
  steps.forEach((step, idx) => {
    const isLast = idx === steps.length - 1;
    const prevDone = idx === 0 || steps[idx-1].hecho;
    html += `
    <div class="step-item">
      <div class="step-left">
        <div class="step-check ${step.hecho?'done':prevDone?'active':'blocked-step'}"
          onclick="toggleSumiStep('${sid}','${tipo}','${step.id}')"></div>
        ${!isLast?`<div class="step-line ${step.hecho?'done':''}"></div>`:''}
      </div>
      <div class="step-body">
        <div class="step-title ${step.hecho?'done-text':''}">
          ${step.titulo}
          <span class="step-date-badge ${step.hecho?'ok':''}">${step.hecho?step.fechaHecho:step.plazo}</span>
        </div>
        <div class="step-meta">${step.meta}</div>
        ${!step.hecho && step.doc ? `<div class="step-actions"><button class="btn btn-ghost btn-sm" onclick="document.getElementById('fileInput').click()">📎 Adjuntar</button></div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

async function guardarNuevoSuministro() {
  const comercial = document.getElementById('ns_comercial')?.value?.trim();
  if (!comercial) { showToast('⚠️ La comercializadora es obligatoria'); return; }

  const pisoId  = document.getElementById('ns_piso').value;
  const tipo    = document.getElementById('ns_tipo').value;
  const titular = document.getElementById('ns_titular').value.trim();
  const cups    = document.getElementById('ns_cups').value.trim();
  const fecha   = document.getElementById('ns_fecha').value;
  const tarifa  = document.getElementById('ns_tarifa').value.trim();

  closeSheet();
  showToast('💾 Guardando suministro…');

  const PASOS_ALTA = [
    { id:'a1', titulo:'Lectura del contador en la entrega de llaves', meta:'Fotografiar contador con fecha visible', plazo:'Día entrada', doc:true, hecho:false, fechaHecho:null },
    { id:'a2', titulo:'Solicitar cambio de titularidad a la comercializadora', meta:'DNI, IBAN y dirección del nuevo titular', plazo:'≤ 5 días', doc:false, hecho:false, fechaHecho:null },
    { id:'a3', titulo:'Subir contrato de suministro firmado', meta:`PDF a nombre de ${titular||'inquilino'} · Guardar nº contrato y CUPS`, plazo:'Tras solicitud', doc:true, hecho:false, fechaHecho:null },
    { id:'a4', titulo:'Confirmar primera factura a nombre del inquilino', meta:'Verificar que el titular es correcto', plazo:'≈ 30-60 días', doc:true, hecho:false, fechaHecho:null },
    { id:'a5', titulo:'Archivar documentación en Drive', meta:'Contrato + primera factura + foto contador', plazo:'Completado', doc:false, hecho:false, fechaHecho:null },
  ];
  const PASOS_BAJA = [
    { id:'b1', titulo:'Lectura del contador en la entrega de llaves', meta:'Fotografiar · Firmar acta de salida', plazo:'Día salida', doc:true, hecho:false, fechaHecho:null },
    { id:'b2', titulo:'Notificar baja/cambio de titular a la comercializadora', meta:'Comunicar fecha de baja del inquilino', plazo:'≤ 3 días', doc:false, hecho:false, fechaHecho:null },
    { id:'b3', titulo:'Liquidación de la última factura', meta:'Comprobar que queda saldada', plazo:'≈ 15-30 días', doc:true, hecho:false, fechaHecho:null },
    { id:'b4', titulo:'Contrato a nombre del arrendador o nuevo inquilino', meta:'Evitar corte del suministro', plazo:'Inmediato', doc:true, hecho:false, fechaHecho:null },
    { id:'b5', titulo:'Archivar última factura y confirmación de baja', meta:'Factura final en carpeta Suministros de Drive', plazo:'Completado', doc:false, hecho:false, fechaHecho:null },
  ];

  const EMOJIS = { luz:'⚡', agua:'💧', gas:'🔥' };
  const LABELS = { luz:'Electricidad', agua:'Agua', gas:'Gas natural' };

  const id = 'su_' + Date.now();
  const nuevo = {
    id, pisoId, tipo, emoji: EMOJIS[tipo], label: LABELS[tipo],
    comercializadora: comercial, inquilino: titular, cups, tarifa,
    potencia: tarifa, fechaAlta: fecha,
    tabActiva: 'alta',
    altaSteps: PASOS_ALTA.map(p => ({ ...p })),
    bajaSteps: PASOS_BAJA.map(p => ({ ...p })),
    docs: [],
  };

  SUMINISTROS.push(nuevo);

  // Guardar en Sheets
  await api({ action:'write', sheet:'Suministros', data:{
    id, piso_id: pisoId, tipo, comercializadora: comercial,
    inquilino: titular, cups, tarifa, potencia: tarifa,
    fecha_alta: fecha, creado_en: new Date().toISOString().split('T')[0]
  }});
  // Guardar pasos de alta y baja
  for (let i = 0; i < PASOS_ALTA.length; i++) {
    const p = PASOS_ALTA[i];
    await api({ action:'write', sheet:'Suministro_Pasos', data:{
      id: p.id, suministro_id: id, proceso:'alta', titulo:p.titulo,
      meta:p.meta, plazo:p.plazo, requiere_doc:p.doc, hecho:false, fecha_hecho:'', orden:i
    }});
  }
  for (let i = 0; i < PASOS_BAJA.length; i++) {
    const p = PASOS_BAJA[i];
    await api({ action:'write', sheet:'Suministro_Pasos', data:{
      id: p.id, suministro_id: id, proceso:'baja', titulo:p.titulo,
      meta:p.meta, plazo:p.plazo, requiere_doc:p.doc, hecho:false, fecha_hecho:'', orden:i
    }});
  }

  showToast(`✅ ${LABELS[tipo]} creado · Checklist de alta y baja activados`);

  // Subir documentos adjuntos si se seleccionaron
  await subirAdjuntos('ns', pisoId, nuevo.comercializadora ? `${nuevo.label} (${nuevo.comercializadora})` : nuevo.label, 'Suministros');

  renderSuministros(document.getElementById('mainContent'));
}

function renderSuministros(el) {
  const tipoClass = {luz:'sumi-luz', agua:'sumi-agua', gas:'sumi-gas'};
  let html = `
    <div class="sumi-nueva-btn" onclick="openNuevoSuministro()">
      <span class="sni">⚡</span>
      <div>
        <div class="snl">Nuevo suministro</div>
        <div class="sns">Luz · Agua · Gas · activa checklist de alta/baja</div>
      </div>
    </div>
    <div class="section-label">Suministros activos</div>`;

  if (SUMINISTROS.length === 0) {
    html += `<div class="empty"><div class="ei">⚡</div><p>No hay suministros registrados aún.<br>Pulsa "Nuevo suministro" para añadir uno.</p></div>`;
    el.innerHTML = html;
    return;
  }

  SUMINISTROS.forEach(s => {
    const isExp = expandedSumi === s.id;
    const p = PISOS.find(x => x.id === s.pisoId);
    if (!p) return; // skip si el piso no existe
    const { done: da, total: ta, pct: pa } = getSumiProgress(s,'alta');
    const { done: db, total: tb, pct: pb } = getSumiProgress(s,'baja');
    const altaDone = pa === 100;
    const bajaDone = pb === 100;

    html += `<div class="sumi-card">
      <div class="sumi-header" onclick="toggleSumiExpand('${s.id}')">
        <div class="sumi-ico-wrap ${tipoClass[s.tipo]}">${s.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${s.label}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${p.ico} ${p.nombre.split(' ').slice(0,2).join(' ')} · ${s.comercializadora}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span class="sumi-tipo-pill ${altaDone?'done':'alta'}">Alta ${pa}%</span>
          ${db>0?`<br><span class="sumi-tipo-pill ${bajaDone?'done':'baja'}" style="margin-top:4px;display:inline-block">Baja ${pb}%</span>`:''}
        </div>
        <div style="color:var(--muted);font-size:14px;margin-left:8px;transition:transform 0.2s;transform:rotate(${isExp?'90':'0'}deg)">›</div>

    // progress bars
    html += `<div style="padding:0 16px 10px;display:flex;flex-direction:column;gap:4px">

        <span style="font-size:10px;color:var(--muted);width:28px;font-family:var(--mono)">Alta</span>
        <div style="flex:1;height:3px;background:var(--surface2);border-radius:2px">
          <div style="width:${pa}%;height:100%;border-radius:2px;background:var(--accent);transition:width 0.4s"></div>
        </div>
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono);width:28px;text-align:right">${da}/${ta}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--muted);width:28px;font-family:var(--mono)">Baja</span>

      </div>
    </div>`;

    if (isExp) {
      // Documentos adjuntos del suministro
      const docs = s.docs || [];
      html += `<div style="padding:0 14px 10px">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Documentos adjuntos</div>`;

        <div class="fsumm-key">Baja</div>
      </div>
      <div class="fsumm-item" style="cursor:pointer" onclick="editarSuministro('${s.id}')">
        <div class="fsumm-val">✏️</div>
        <div class="fsumm-key">Editar</div>
      </div>
    </div></div>`;
  });

// ══════════════════════════════════════════
// ── MÓDULO: CONTRATO NUEVO ──
// ══════════════════════════════════════════
const CONTRATOS_CHECKLIST = [];

let expandedContrato = null;

function toggleContratoStep(cid, stepId) {
  const c = CONTRATOS_CHECKLIST.find(x=>x.id===cid);
  let step = null;
  let stepIdx = 0, prevDone = true;
  c.fases.forEach(f => {
    f.pasos.forEach((p, i) => {
      if (p.id === stepId) { step = p; stepIdx = i; }
    });
  });
  if (!step) return;
  step.hecho = !step.hecho;
  step.fechaHecho = step.hecho ? new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : null;
  renderContrato(document.getElementById('mainContent'));
  showToast(step.hecho ? '✅ Paso completado' : '↩ Desmarcado');
}

function toggleContratoExpand(id) {
  expandedContrato = expandedContrato === id ? null : id;
  renderContrato(document.getElementById('mainContent'));
}

function renderContrato(el) {
  let html = `
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="abrirFormContrato('')">
      + Nuevo contrato
    </button>
    <div class="section-label">Procesos activos</div>`;

  if (CONTRATOS_CHECKLIST.length === 0) {
    html += `<div class="empty"><div class="ei">📋</div><p>No hay contratos registrados aún.<br>Pulsa el botón de arriba para empezar.</p></div>`;
    el.innerHTML = html;
    return;
  }

  CONTRATOS_CHECKLIST.forEach(c => {
    const allSteps = c.fases.flatMap(f=>f.pasos);
    const done = allSteps.filter(p=>p.hecho).length;
    const total = allSteps.length;
    const pct = Math.round((done/total)*100);
    const isExp = expandedContrato === c.id;
    const p = PISOS.find(x=>x.id===c.pisoId);
    const pisoLabel = p ? `${p.ico} ${p.nombre.split(' ').slice(0,2).join(' ')}` : '🏠 Propiedad';
    const faseActual = pct===100?3:pct>60?2:pct>25?1:0;

    html += `<div class="contrato-card">
      <div class="contrato-header" onclick="toggleContratoExpand('${c.id}')">
        <div style="font-size:20px">📋</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${c.inquilino}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${pisoLabel} · ${fmt(c.renta)}/mes</div>
        </div>
        <div style="text-align:right">
          <span class="fase-badge fase-${faseActual}">${pct===100?'Completado':'Fase '+(faseActual+1)+'/4'}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)">${done}/${total} pasos</div>
        </div>
        <div style="color:var(--muted);font-size:14px;margin-left:8px;transform:rotate(${isExp?90:0}deg);transition:transform 0.2s">›</div>
      </div>
      <div style="padding:0 16px 12px">
        <div style="height:3px;background:var(--surface2);border-radius:2px">
          <div style="width:${pct}%;height:100%;border-radius:2px;background:var(--accent);transition:width 0.4s"></div>
        </div>
      </div>`;

    if (isExp) {
      // Documentos adjuntos del contrato
      if (c.docs && c.docs.length > 0) {
        html += `<div style="padding:0 14px 10px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Documentos adjuntos</div>
          <div style="display:flex;flex-direction:column;gap:4px">`;
        c.docs.forEach(doc => {
          html += `<div style="background:var(--surface2);border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px">
            <span style="font-size:13px">📄</span>
            <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--success)">${doc.name}</span>
            <a href="${doc.url}" target="_blank" style="text-decoration:none"><button class="btn btn-ghost btn-sm">👁️ Ver</button></a>
          </div>`;
        });
        html += `</div></div>`;
      }

      // Fases y pasos
      c.fases.forEach((fase, fi) => {
        const faseDone = fase.pasos.filter(p=>p.hecho).length;
        html += `<div class="contrato-section-label">${fase.label} <span style="margin-left:6px;font-size:10px">${faseDone}/${fase.pasos.length}</span></div>
        <div style="padding:4px 12px 8px">`;
        fase.pasos.forEach((paso, pi) => {
          const allFlat = c.fases.flatMap(f=>f.pasos);
          const globalIdx = allFlat.indexOf(paso);
          const prevOk = globalIdx === 0 || allFlat[globalIdx-1].hecho;
          html += `
          <div class="step-item">
            <div class="step-left">
              <div class="step-check ${paso.hecho?'done':prevOk?'active':'blocked-step'}"
                onclick="${paso.hecho||prevOk?`toggleContratoStep('${c.id}','${paso.id}')`:'showToast(\"⚠️ Completa el paso anterior\")'}"></div>
              ${!(fi===c.fases.length-1&&pi===fase.pasos.length-1)?`<div class="step-line ${paso.hecho?'done':''}"></div>`:''}
            </div>
            <div class="step-body">
              <div class="step-title ${paso.hecho?'done-text':''}">
                ${paso.titulo}
                <span class="step-date-badge ${paso.hecho?'ok':''}">${paso.hecho?paso.fechaHecho:''}</span>
              </div>
              <div class="step-meta">${paso.meta}</div>
              ${!paso.hecho&&paso.doc?`<div class="step-actions"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();subirDocContrato('${c.id}')">📎 Adjuntar</button></div>`:''}
            </div>
          </div>`;
        });
        html += `</div>`;
      });
    }

    html += `<div class="fianza-summary">
      <div class="fsumm-item"><div class="fsumm-val" style="color:var(--accent)">${fmt(c.renta)}/mes</div><div class="fsumm-key">Renta</div></div>
      <div class="fsumm-item"><div class="fsumm-val">${pct}%</div><div class="fsumm-key">Progreso</div></div>
      <div class="fsumm-item" style="cursor:pointer" onclick="event.stopPropagation();abrirFormContrato('${c.id}')"><div class="fsumm-val">✏️</div><div class="fsumm-key">Editar</div></div>
    </div></div>`;
  });

  html += `
    <div class="section-label" style="margin-top:8px">Documentos necesarios</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.9;color:var(--muted)">
      <div style="display:flex;gap:8px;margin-bottom:4px"><span style="color:var(--accent);font-family:var(--mono)">Inquilino</span> DNI/NIE · 3 nóminas · Declaración IRPF · Aval si se pide</div>
      <div style="display:flex;gap:8px;margin-bottom:4px"><span style="color:var(--info);font-family:var(--mono)">Contrato</span> 2 originales firmados · Inventario firmado · Acta entrega llaves</div>
      <div style="display:flex;gap:8px"><span style="color:var(--success);font-family:var(--mono)">Legal</span> Recibo fianza · Resguardo DGA · Alta suministros a nombre inquilino</div>
    </div>`;

  el.innerHTML = html;
}
